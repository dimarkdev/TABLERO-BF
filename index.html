function PageDetalle({ initialFilter }) {
  const D = window.TableroData; if(!D) return null;
  const [open, setOpen] = useState(null);
  const [city, setCity] = useState(initialFilter?.city || '');
  const [dept, setDept] = useState(initialFilter?.dept || '');
  const [matFilt, setMatFilt] = useState(initialFilter?.matFilt || '');
  const [physFilt, setPhysFilt] = useState(initialFilter?.physType || '');
  const [src, setSrc] = useState(initialFilter?.src || 'gastro_int');

  const SOURCES = [
    { id:'gastro_int',    label:`Gastronómico Interior (${D.locales.length})` },
    { id:'gastro_central',label:`Gastronómico Central (${(D.gcLocales||[]).length})` },
    { id:'tiendas',       label:`Promo - Día de la Madre (${D.localesTiendas.length})` },
    { id:'tiendas_compe', label:`Promo - Día de la Madre Competencia (${D.localesTiendas.filter(l=>l.comp&&l.comp!=='—'&&l.comp!=='No').length})` },
    { id:'compe',         label:`Competencia Gastronómica (${(window.__rawCompe||[]).length})` },
  ];

  const allLocales = src==='gastro_int'     ? D.locales
                   : src==='gastro_central' ? (D.gcLocales||[])
                   : src==='tiendas'        ? D.localesTiendas
                   : src==='tiendas_compe'  ? D.localesTiendas.filter(l=>l.comp&&l.comp!=='—'&&l.comp!=='No').map(l=>({
                       name: l.name, city: l.city,
                       material: true,
                       state: '—',
                       benefit: l.comp,
                       obs: l.obs,
                       fotos: l.fotos_comp||[],
                     }))
                   : (window.__rawCompe||[]).map(r=>({
                       name: r.LOCAL||r.local||'—',
                       city: r.CIUDAD||r.ciudad||'—',
                       material: r.HAY_MATERIAL_COMPETENCIA==='Sí'||r.HAY_MATERIAL_COMPETENCIA==='Si'||r.HAY_MATERIAL_COMPETENCIA==='si',
                       state: r.VISIBILIDAD_VS_BF||'—',
                       benefit: r.MARCAS_IDENTIFICADAS||'—',
                       obs: r.OBSERVACIONES||'',
                       fotos: ['FOTO_COMP_1','FOTO_COMP_2'].map(k=>r[k]).filter(Boolean),
                     }));

  const cities = [...new Set(allLocales.map(l=>l.city).filter(Boolean))].sort();
  const depts  = [...new Set(allLocales.map(l=>CITY_DEPT[l.city]||CITY_DEPT[(l.city||'').toLowerCase()]).filter(Boolean))].sort();
  const physTypesList = [...new Set(allLocales.flatMap(l=>l.physTypes||[]))].sort();
  const rows = allLocales.filter(l =>
    (!city || l.city===city) &&
    (!dept || (CITY_DEPT[l.city]||CITY_DEPT[(l.city||'').toLowerCase()])===dept) &&
    (!matFilt || (matFilt==='si' ? l.material : !l.material)) &&
    (!physFilt || (l.physTypes||[]).includes(physFilt))
  );

  const tone = s => {
    if (!s||s==='—') return 'gr';
    if (s.includes('perfecto')||s.includes('Perfecto')) return 'g';
    if (s.includes('deterior')||s.includes('mal ubic')) return 'o';
    if (s.includes('camp.')||s.includes('anterior')) return 'y';
    if (s.includes('visible desde')||s.includes('Sí, visible')) return 'g';
    if (s.includes('no visible')||s.includes('No visible')||s.includes('no está')||s.includes('No está')) return 'r';
    return 'gr';
  };
  const knowTone = k => k&&(k.includes('bien')||k==='Sí'||k==='Si')?'g':k&&(k.includes('Parcial')||k.includes('parcial'))?'o':k&&(k.includes('No')||k.includes('no'))?'r':'gr';

  const srcLabel = SOURCES.find(s=>s.id===src)?.label||'';

  return (
    <>
      {initialFilter?.cameFrom && (
        <div onClick={()=>window.__goBack()}
          style={{display:'inline-flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:12,fontWeight:600,color:'var(--navy)',marginBottom:10}}>
          <span style={{fontSize:15}}>←</span> Volver
        </div>
      )}
      <div className="sec-lbl">{srcLabel}</div>
      <div className="filterbar" style={{marginBottom:14}}>
        <span className="fl">Relevamiento</span>
        <select className="fs" value={src} onChange={e=>{setSrc(e.target.value);setOpen(null);setCity('');setDept('');setMatFilt('');setPhysFilt('');}}>
          {SOURCES.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
        {depts.length > 0 && <>
          <span className="fl">Departamento</span>
          <select className="fs" value={dept} onChange={e=>{setDept(e.target.value);setOpen(null);}}>
            <option value="">Todos</option>
            {depts.map(d=><option key={d}>{d}</option>)}
          </select>
        </>}
        {cities.length > 0 && <>
          <span className="fl">Ciudad</span>
          <select className="fs" value={city} onChange={e=>{setCity(e.target.value);setOpen(null);}}>
            <option value="">Todas</option>
            {cities.map(c=><option key={c}>{c}</option>)}
          </select>
        </>}
        <span className="fl">Material</span>
        <select className="fs" value={matFilt} onChange={e=>{setMatFilt(e.target.value);setOpen(null);}}>
          <option value="">Todos</option>
          <option value="si">Con material</option>
          <option value="no">Sin material</option>
        </select>
        {physTypesList.length > 0 && <>
          <span className="fl">Tipo de material</span>
          <select className="fs" value={physFilt} onChange={e=>{setPhysFilt(e.target.value);setOpen(null);}}>
            <option value="">Todos</option>
            {physTypesList.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        </>}
        <span className="rc">{rows.length} locales</span>
      </div>
      <div className="lg">
        {rows.map((l, i) => (
          <div className="lc" key={i}>
            <div className="lh" onClick={() => setOpen(open===i?null:i)}>
              <div className="li">
                <div className="ln">{l.name}</div>
                <div className="lci">{l.city && l.city+' · '}{l.type||''}</div>
              </div>
              <Tag tone={l.material?'g':'r'}>{l.material?'Con material':'Sin material'}</Tag>
              {l.knows && l.knows!=='—' && <Tag tone={knowTone(l.knows)}>{l.knows}</Tag>}
              <span className={'chv'+(open===i?' open':'')}>▾</span>
            </div>
            {open===i && (
              <div className="lb">
                <div className="dg">
                  {l.state && l.state!=='—' && <div><div className="dk">{src==='compe'?'Visibilidad vs BF':'Estado del material'}</div><div className="dv"><Tag tone={tone(l.state)}>{l.state}</Tag></div></div>}
                  {l.type  && l.type!=='—'  && <div><div className="dk">Tipo de local</div><div className="dv">{l.type}</div></div>}
                  {l.benefit && l.benefit!=='—' && <div><div className="dk">{src==='compe'?'Marcas':'Material colocado'}</div><div className="dv">{l.benefit}</div></div>}
                  {l.encargado && l.encargado!=='—' && <div><div className="dk">Encargado</div><div className="dv">{l.encargado}</div></div>}
                  {l.comp && l.comp!=='—' && l.comp!=='No' && <div><div className="dk">Competencia</div><div className="dv">{l.comp}</div></div>}
                  {l.link && <div><div className="dk">Fotos (Drive)</div><div className="dv"><a href={l.link} target="_blank" rel="noopener noreferrer" style={{color:'var(--blue)',fontWeight:600}}>Ver carpeta</a></div></div>}
                  {l.obs && <div style={{gridColumn:'span 2'}}><div className="dk">Observaciones</div><div className="dv">{l.obs}</div></div>}
                </div>
                {l.fotos && l.fotos.length > 0 ? (
                  <>
                    <div className="pl">Evidencia fotográfica</div>
                    <div className="di-fotos">
                      {l.fotos.map((url, j) => {
                        const thumb = driveThumb(url);
                        return (
                          <div className="di-thumb" key={j} onClick={() => openLB(l.fotos, j)}>
                            {thumb ? <img src={thumb} alt={`Foto ${j+1}`} loading="lazy" onError={e=>e.target.style.display='none'} /> : <div className="pp">Sin preview</div>}
                          </div>
                        );
                      })}
                    </div>
                  </>
                ) : <div className="pp" style={{width:'100%',marginTop:8}}>Sin evidencia fotográfica registrada.</div>}
              </div>
            )}
          </div>
        ))}
        {rows.length===0 && <div className="nodata">Sin registros para los filtros seleccionados.</div>}
      </div>
    </>
  );
}

  const ciudades = [...new Set((srcMap[tab]||[]).map(l=>l.city).filter(Boolean))].sort();
  const filtered = (srcMap[tab]||[]).filter(l =>
    (!search || l.name.toLowerCase().includes(search.toLowerCase())) &&

  );

  return (
    <>
      <div className="ev-sub-tabs">
        {TABS.map(t=>(
          <div key={t.id} className={'ev-tab'+(tab===t.id?' active':'')} onClick={()=>{setTab(t.id);setCiudad('');setSearch('');}}>
            {t.label}
          </div>
        ))}
      </div>

      {/* Sub-selector solo en Competencia */}
      {tab==='comp' && (
        <div style={{display:'flex',gap:8,margin:'10px 0',flexWrap:'wrap'}}>
          {[{id:'gastro',label:'Gastronómico Interior'},{id:'madres',label:'Promo - Día de la Madre'}].map(s=>
            React.createElement('button',{
              key:s.id, onClick:()=>{setCompSub(s.id);setSearch('');setCiudad('');},
              style:{
                padding:'6px 16px',borderRadius:'8px',border:'none',cursor:'pointer',
                fontFamily:'inherit',fontSize:'12px',fontWeight:'600',
                background: compSub===s.id ? 'var(--navy)' : 'var(--bsoft)',
                color: compSub===s.id ? '#fff' : 'var(--navy)',
                transition:'all .15s',
              }
            }, s.label)
          )}
        </div>
      )}

      <div className="ev-filter-row">
        <input className="ev-search" type="text" placeholder="Buscar local..." value={search} onChange={e=>setSearch(e.target.value)} />
        {ciudades.length>0 && (
          <select className="fs" value={ciudad} onChange={e=>setCiudad(e.target.value)}>
            <option value="">Todas las ciudades</option>
            {ciudades.map(c=><option key={c}>{c}</option>)}
          </select>
        )}
        <span className="rc-right">{filtered.length} locales con fotos</span>
      </div>
      {filtered.length===0
        ? <div className="nodata">Sin fotos disponibles para los filtros seleccionados.</div>
        : <div className="ev-grid-real">{filtered.map((r,i)=><EvCard key={i} r={r}/>)}</div>
      }
    </>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════════════ */
const TITLES = {
  resumen:      ['Resumen Ejecutivo',              'Visión gerencial del relevamiento'],
  gastro:       ['Relevamiento Gastronómico',       'Locales gastronómicos · BF y competencia'],
  tiendas:      ['Promoción Día de las Madres',      'Puntos de venta tiendas'],
  detalle:      ['Detalle por Local',               'Ficha individual de cada local'],
  evidencias:   ['Evidencias Fotográficas',         'Registro fotográfico por día'],
  conclusiones: ['Conclusiones y Recomendaciones', 'Análisis comparativo · Interior + Asunción y alrededores'],
};
function PageConclusiones() {
  const D = window.TableroData; if(!D) return null;
  const [tab, setTab] = React.useState('central');
  const k = D.kpi;

  const TABS = [
    { id:'central',  label:'Gastronómico Central'        },
    { id:'interior', label:'Gastronómico Interior'       },
    { id:'madres',   label:'Promoción Día de las Madres' },
  ];

  /* ── helpers ── */
  const card    = { background:'var(--white)', border:'1px solid var(--border)', borderRadius:'var(--r)', boxShadow:'var(--sh)', overflow:'hidden' };
  const cardHd  = (color='var(--navy)') => ({ background: color==='green'?'#DCFCE7':color==='red'?'#FEE2E2':'var(--bxpal)', borderBottom:'1px solid var(--border2)', padding:'10px 16px', fontSize:'10px', fontWeight:700, textTransform:'uppercase', letterSpacing:'.07em', color: color==='green'?'#15803D':color==='red'?'#991B1B':'var(--navy)' });
  const cardBd  = { padding:'16px' };
  const col     = (gap=12) => ({ display:'flex', flexDirection:'column', gap });
  const g2      = { display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 };

  function StatRow({ label, value, pct, color='var(--navy)', total }) {
    return (
      <div style={{display:'flex',flexDirection:'column',gap:4,padding:'8px 0',borderBottom:'1px solid var(--border2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{label}</span>
          <span style={{fontSize:13,fontWeight:800,color}}>{pct!=null?pct+'%':value}</span>
        </div>
        {pct!=null && <div style={{height:6,background:'var(--bpale)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:color,borderRadius:3,transition:'width .6s'}}/>
        </div>}
        {total!=null && <div style={{fontSize:10,color:'var(--muted)'}}>{value} de {total} locales</div>}
      </div>
    );
  }

  function FindingRow({ icon, text }) {
    return (
      <div style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 0',borderBottom:'1px solid var(--border2)'}}>
        <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
        <span style={{fontSize:12,lineHeight:1.65,color:'var(--text)'}}>{text}</span>
      </div>
    );
  }

  function RecoCard({ icon, priority, color, bg, title, body }) {
    return (
      <div style={{borderRadius:'var(--r)',overflow:'hidden',border:'1px solid '+color+'44',boxShadow:'var(--sh)'}}>
        <div style={{background:color,padding:'6px 14px',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11}}>{icon}</span>
          <span style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'#fff'}}>{priority}</span>
        </div>
        <div style={{background:bg,padding:'12px 14px'}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--navy)',marginBottom:5}}>{title}</div>
          <div style={{fontSize:11.5,color:'var(--text)',lineHeight:1.65}}>{body}</div>
        </div>
      </div>
    );
  }

  /* ════════════════════ CENTRAL ════════════════════ */
  function TabCentral() {
    const total  = D.gcTotal || 0;
    const conMat = D.gcConMat || 0;
    const sinMat = D.gcSinMatK || 0;
    const covPct = D.gcCovPct || 0;
    if (total === 0) return <div className="nodata">Sin datos cargados en RE_BF_GASTRO_CENTRAL aún.</div>;
    const topCities = (D.gcCityBF||[]).map(r=>({...r,pct:r.con+r.sin>0?Math.round(r.con/(r.con+r.sin)*100):0})).sort((a,b)=>b.pct-a.pct);
    const topCity   = topCities[0];
    /* Umbral mínimo de muestra para que una ciudad se use en el análisis de
       "menor cobertura": evita que una ciudad con 1 solo local (0% o 100%)
       se lea con el mismo peso que una con decenas de locales. */
    const MIN_SAMPLE = 3;
    const sigCities  = topCities.filter(c => (c.con+c.sin) >= MIN_SAMPLE);
    const lowCity    = sigCities.length ? sigCities[sigCities.length-1] : null;
    const lowCityAny = topCities.length ? [...topCities].reverse()[0] : null;
    const lowSample  = lowCityAny && (c => (c.con+c.sin) < MIN_SAMPLE)(lowCityAny) && (!lowCity || lowCityAny.city !== lowCity.city) ? lowCityAny : null;
    /* Peso de Central dentro del universo total relevado (Central + Interior),
       para dimensionar cuánto pesa reforzar Central sobre el resultado global. */
    const interiorTotal  = k.totalBF || 0;
    const combinedTotal  = total + interiorTotal;
    const centralSharePct = combinedTotal>0 ? Math.round(total/combinedTotal*100) : 0;
    const sinMatLocales = (D.gcLocales||[]).filter(l=>!l.material);
    return (
      <div style={col(14)}>
        {/* Banner */}
        <div className="exec">
          <div className="exec-l">
            <div className="exec-eyebrow">Relevamiento Gastronómico Central</div>
            <div className="exec-head">Cobertura BF: <b style={{color:'var(--yellow)'}}>{covPct}%</b> en {total} locales relevados</div>
            <div className="exec-sub" style={{marginTop:6}}>
              Se relevaron <b>{total} locales gastronómicos</b> en el área Central (Asunción y alrededores).
              {covPct >= 70
                ? ` Con una cobertura del ${covPct}%, el desempeño es destacado y evidencia una distribución efectiva del material BF en la zona.`
                : ` Con una cobertura del ${covPct}%, existe margen de mejora considerable. ${sinMat} locales aún no cuentan con material BF activo.`}
            </div>
          </div>
          <div className="exec-r">
            <div className="exec-stat"><div className="exec-num">{total}</div><div className="exec-cap">Locales relevados</div></div>
            <div className="exec-stat"><div className="exec-num" style={{color:'var(--yellow)'}}>{covPct}%</div><div className="exec-cap">Cobertura</div></div>
          </div>
        </div>

        {/* Material BF */}
        <div style={g2}>
          <div style={card}>
            <div style={cardHd('blue')}> Material Banco Familiar</div>
            <div style={cardBd}>
              <StatRow label="Con material BF"    value={conMat} pct={covPct}          color="var(--blue-700)"  total={total}/>
              <StatRow label="Sin material BF"    value={sinMat} pct={100-covPct}       color="var(--red)"       total={total}/>
              {topCity && <StatRow label={`Mejor ciudad: ${topCity.city}`} value={topCity.con} pct={topCity.pct} color="#15803D" total={topCity.con+topCity.sin}/>}
              {lowCity && lowCity.pct < 80 && <StatRow label={`Oportunidad: ${lowCity.city}`} value={lowCity.con} pct={lowCity.pct} color="var(--orange)" total={lowCity.con+lowCity.sin}/>}
            </div>
          </div>
          <div style={card}>
            <div style={cardHd('blue')}> Distribución por tipo de material</div>
            <div style={cardBd}>
              {(D.gcMaterialType||[]).filter(m=>!m.negative).slice(0,5).map((m,i)=>(
                <StatRow key={i} label={m.label} value={m.value} pct={total>0?Math.round(m.value/total*100):0} color="var(--blue-mid)" total={total}/>
              ))}
            </div>
          </div>
        </div>

        {/* Locales agrupados por ciudad: con material y sin material */}
        <div style={g2}>
          {(() => {
            const volumeOrder = [...topCities].sort((a,b)=>(b.con+b.sin)-(a.con+a.sin)).map(c=>c.city);
            const groupByCity = locs => {
              const map = {};
              locs.forEach(l => { const c = l.city||'—'; if(!map[c]) map[c]=[]; map[c].push(l); });
              return Object.keys(map)
                .sort((a,b)=>volumeOrder.indexOf(a)-volumeOrder.indexOf(b))
                .map(city=>({city, items:map[city]}));
            };
            const sinMatByCity = groupByCity(sinMatLocales);
            return (
              <div style={card}>
                <div style={cardHd('blue')}> Locales sin material, por ciudad ({sinMat})</div>
                <div style={cardBd}>
                  {sinMatByCity.length>0 ? (
                    <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:420,overflowY:'auto'}}>
                      {sinMatByCity.map((g,i)=>(
                        <div key={i}>
                          <div onClick={()=>window.__goToDetalle(g.city,'gastro_central')} style={{cursor:'pointer',fontSize:11,fontWeight:700,color:'var(--navy)',marginBottom:4}}>
                            {g.city} <span style={{color:'var(--muted)',fontWeight:400}}>({g.items.length})</span>
                          </div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                            {g.items.map((l,j)=>(
                              <span key={j} style={{fontSize:11,background:'var(--bxpal)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 8px',color:'var(--text)'}}>{l.name}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : <div style={{fontSize:12,color:'var(--muted)'}}>Todos los locales relevados tienen material BF colocado.</div>}
                </div>
              </div>
            );
          })()}
          {(() => {
            const volumeOrder = [...topCities].sort((a,b)=>(b.con+b.sin)-(a.con+a.sin)).map(c=>c.city);
            const groupByCity = locs => {
              const map = {};
              locs.forEach(l => { const c = l.city||'—'; if(!map[c]) map[c]=[]; map[c].push(l); });
              return Object.keys(map)
                .sort((a,b)=>volumeOrder.indexOf(a)-volumeOrder.indexOf(b))
                .map(city=>({city, items:map[city]}));
            };
            const conMatByCity = groupByCity((D.gcLocales||[]).filter(l=>l.material));
            return (
              <div style={card}>
                <div style={cardHd('blue')}> Locales con material BF, por ciudad ({conMat})</div>
                <div style={cardBd}>
                  <div style={{display:'flex',flexDirection:'column',gap:10,maxHeight:420,overflowY:'auto'}}>
                    {conMatByCity.map((g,i)=>(
                      <div key={i}>
                        <div onClick={()=>window.__goToDetalle(g.city,'gastro_central')} style={{cursor:'pointer',fontSize:11,fontWeight:700,color:'var(--navy)',marginBottom:4}}>
                          {g.city} <span style={{color:'var(--muted)',fontWeight:400}}>({g.items.length})</span>
                        </div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                          {g.items.map((l,j)=>(
                            <span key={j} style={{fontSize:11,background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:6,padding:'3px 8px',color:'var(--text)'}}>{l.name}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })()}
        </div>

        {/* Hallazgos */}
        <div style={card}>
          <div style={cardHd('blue')}> Hallazgos clave</div>
          <div style={cardBd}>
            <FindingRow icon="" text={`El área Central concentra ${total} de los ${combinedTotal} locales relevados a nivel país (Central + Interior), es decir el ${centralSharePct}% del universo total. Con ${covPct}% de cobertura (${conMat}/${total} locales), cada punto porcentual que se gane en Central mueve el resultado global más que uno equivalente en el interior, justamente por ese mayor peso relativo. ${covPct>=70?'El nivel actual ya es sólido; el foco pasa a sostenerlo y cerrar los locales puntuales que faltan.':'Por eso reforzar Central primero — antes que expandir en el interior — es donde más rinde la próxima ronda de distribución.'}`}/>
            {topCity && <FindingRow icon="" text={`${topCity.city} lidera con ${topCity.pct}% de cobertura (${topCity.con} de ${topCity.con+topCity.sin} locales)${(topCity.con+topCity.sin)<MIN_SAMPLE?', aunque con una muestra chica (menos de 3 locales relevados), por lo que conviene tomarlo como referencia y no como conclusión cerrada':', siendo el punto más fuerte del relevamiento Central'}.`}/>}
            {lowCity && lowCity.pct < 80 && <FindingRow icon="" text={`Entre las ciudades con al menos ${MIN_SAMPLE} locales relevados (para que el % sea comparable), ${lowCity.city} tiene la menor cobertura: ${lowCity.pct}% (${lowCity.con} de ${lowCity.con+lowCity.sin} locales). Es la zona prioritaria para la próxima ronda de distribución.`}/>}
            {lowSample && <FindingRow icon="" text={`${lowSample.city} muestra ${lowSample.pct}% de cobertura, pero sobre apenas ${lowSample.con+lowSample.sin} local${lowSample.con+lowSample.sin===1?'':'es'} relevado${lowSample.con+lowSample.sin===1?'':'s'}. Con una muestra tan chica, esa cifra no pesa igual que la de una ciudad con muchos locales y no alcanza para tratarla como zona prioritaria por sí sola; conviene relevar más puntos ahí antes de sacar conclusiones.`}/>}
            <FindingRow icon="" text={`Hay ${sinMat} locales sin material BF en Central${sinMatLocales.length?` (listado completo en "Locales sin material, por ciudad", arriba)`:''}. ${sinMat>5?'Al ser un volumen considerable dentro de la zona de mayor peso relativo, representan la oportunidad de reposición con mayor impacto potencial en la cobertura global.':'Son casos puntuales, resolubles con una visita de reposición dirigida a esos locales específicos.'}`}/>
          </div>
        </div>

        {/* Recomendaciones */}
        <div style={g2}>
          <RecoCard icon="" priority="Alta prioridad" color="#1D4ED8" bg="#EFF6FF"
            title="Reposición inmediata en zonas con baja cobertura"
            body={`Coordinar visitas de reposición a los ${sinMat} locales sin material BF, priorizando${lowCity?' '+lowCity.city+' y':''} los puntos de mayor tráfico. El objetivo es superar el ${Math.min(covPct+15,100)}% de cobertura en el próximo relevamiento.`}/>
          <RecoCard icon="" priority="Alta prioridad" color="#15803D" bg="#F0FDF4"
            title="Capitalizar la fortaleza en zonas de alta cobertura"
            body={`${topCity?topCity.city+' y otras ciudades con alta cobertura':'Las ciudades con alta cobertura'} deben mantenerse con reposición preventiva. Usar estos locales como referencia de buenas prácticas para el material BF en el área Central.`}/>
          <RecoCard icon="" priority="Acción continua" color="#D97706" bg="#FFFBEB"
            title="Registro fotográfico como estándar de calidad"
            body="Mantener el relevamiento fotográfico en cada visita permite verificar el estado real del material, comparar ciclos y detectar deterioro o mal posicionamiento antes de que impacte en la visibilidad de marca."/>
          <RecoCard icon="" priority="Próximo ciclo" color="#7C3AED" bg="#F5F3FF"
            title="Relevamiento de seguimiento"
            body={`Repetir el relevamiento sobre los mismos ${total} locales del área Central para tener una visión comparativa del avance una vez ejecutadas las acciones de reposición.`}/>
        </div>
      </div>
    );
  }

  /* ════════════════════ INTERIOR ════════════════════ */
  function TabInterior() {
    const total    = k.totalBF, conMat = k.conBF, sinMat = k.sinBF, covPct = k.covBF;
    const covComp  = k.covCP, conComp = k.conCP;
    const knowsWell= k.knowsWell;
    const deptRows = Object.entries(D.deptBF).map(([n,d])=>({name:n,city:D.DEPT_CITY[n]||n,...d,pct:d.total?Math.round(d.con/d.total*100):0})).sort((a,b)=>b.pct-a.pct);
    const topDept  = deptRows[0];
    const MIN_SAMPLE_DEPT = 3;
    const sigDeptRows = deptRows.filter(d => d.total >= MIN_SAMPLE_DEPT);
    const lowDept  = sigDeptRows.length ? sigDeptRows[sigDeptRows.length-1] : deptRows[deptRows.length-1];
    const lowDeptSmallSample = deptRows.length && deptRows[deptRows.length-1].total < MIN_SAMPLE_DEPT && (!sigDeptRows.length || deptRows[deptRows.length-1].name !== lowDept.name) ? deptRows[deptRows.length-1] : null;
    return (
      <div style={col(14)}>
        <div className="exec">
          <div className="exec-l">
            <div className="exec-eyebrow">Relevamiento Gastronómico Interior</div>
            <div className="exec-head">Cobertura BF: <b style={{color:'var(--yellow)'}}>{covPct}%</b> en {total} locales · {k.departments} departamentos</div>
            <div className="exec-sub" style={{marginTop:6}}>
              Relevamiento abarcó <b>{total} locales gastronómicos</b> en <b>{k.departments} departamentos del interior</b>.
              La competencia está presente en el {covComp}% de los mismos puntos.
              {covPct >= 60 ? ` La cobertura del ${covPct}% demuestra una presencia consolidada en el interior del país.`
                           : ` Con ${covPct}% de cobertura, el interior presenta oportunidades claras de crecimiento.`}
            </div>
          </div>
          <div className="exec-r">
            <div className="exec-stat"><div className="exec-num">{total}</div><div className="exec-cap">Locales relevados</div></div>
            <div className="exec-stat"><div className="exec-num" style={{color:'var(--yellow)'}}>{covPct}%</div><div className="exec-cap">Cobertura BF</div></div>
          </div>
        </div>

        <div style={g2}>
          {/* Material BF */}
          <div style={card}>
            <div style={cardHd('blue')}> Material Banco Familiar</div>
            <div style={cardBd}>
              <StatRow label="Con material BF"    value={conMat}    pct={covPct}       color="var(--blue-700)" total={total}/>
              <StatRow label="Sin material BF"    value={sinMat}    pct={100-covPct}   color="var(--red)"      total={total}/>
              <StatRow label="Conocen la promo"   value={knowsWell} pct={total>0?Math.round(knowsWell/total*100):0} color="var(--yellow)" total={total}/>
              {topDept && <StatRow label={`Mejor dpto: ${topDept.city}`} value={topDept.con} pct={topDept.pct} color="#15803D" total={topDept.total}/>}
              {lowDept && <StatRow label={`Oportunidad: ${lowDept.city}`} value={lowDept.con} pct={lowDept.pct} color="var(--orange)" total={lowDept.total}/>}
            </div>
          </div>
          {/* Competencia */}
          <div style={card}>
            <div style={cardHd('red')}>️ Competencia detectada</div>
            <div style={cardBd}>
              <StatRow label="Locales con competencia" value={conComp} pct={covComp} color="var(--red)" total={k.totalCP}/>
              <StatRow label="Sin material competencia" value={k.totalCP-conComp} pct={100-covComp} color="#15803D" total={k.totalCP}/>
              {(D.competitors||[]).slice(0,4).map((c,i)=>(
                <StatRow key={i} label={c.label} value={c.value} pct={k.totalCP>0?Math.round(c.value/k.totalCP*100):0} color="#DC2626" total={k.totalCP}/>
              ))}
            </div>
          </div>
        </div>

        <div style={card}>
          <div style={cardHd('blue')}> Hallazgos clave</div>
          <div style={cardBd}>
            <FindingRow icon="" text={`Cobertura del ${covPct}% en ${total} locales del interior (${conMat} con material BF). ${covPct>=60?'La presencia en el interior es sólida y refleja un trabajo de distribución consistente.':'Hay margen significativo para incrementar la presencia en el interior.'}`}/>
            {topDept && <FindingRow icon="" text={`${topDept.city} (${topDept.name}) es el departamento con mejor rendimiento con ${topDept.pct}% de cobertura (${topDept.con}/${topDept.total} locales). Es un modelo a replicar en otros departamentos.`}/>}
            {lowDept && <FindingRow icon="" text={`Entre los departamentos con al menos ${MIN_SAMPLE_DEPT} locales relevados, ${lowDept.city} (${lowDept.name}) registra la menor presencia con ${lowDept.pct}% (${lowDept.con}/${lowDept.total} locales). Es el foco más urgente de atención para la próxima campaña.`}/>}
            {lowDeptSmallSample && <FindingRow icon="" text={`${lowDeptSmallSample.city} (${lowDeptSmallSample.name}) muestra ${lowDeptSmallSample.pct}% de cobertura, pero sobre solo ${lowDeptSmallSample.total} local${lowDeptSmallSample.total===1?'':'es'} relevado${lowDeptSmallSample.total===1?'':'s'}. Esa muestra es demasiado chica para pesar igual que un departamento con muchos locales; conviene relevar más puntos ahí antes de priorizarlo.`}/>}
            <FindingRow icon="" text={`El ${Math.round(knowsWell/total*100)}% de los encargados conoce bien la promoción. ${knowsWell/total>=0.6?'Este nivel de conocimiento es un activo importante para la visibilidad de marca en el punto de venta.':'Incrementar la capacitación in-situ puede mejorar significativamente la efectividad de la campaña.'}`}/>
            <FindingRow icon="" text={`La competencia está presente en el ${covComp}% de los locales relevados. ${D.competitors?.[0]?D.competitors[0].label+' lidera con '+D.competitors[0].value+' locales.':''} ${covComp>40?'La presión competitiva es alta y requiere estrategia de diferenciación.':'La presencia competitiva es manejable pero debe monitorearse.'}`}/>
          </div>
        </div>

        <div style={g2}>
          <RecoCard icon="" priority="Alta prioridad" color="#1D4ED8" bg="#EFF6FF"

<script type="text/babel">
/* ── Design system report.jsx (verbatim) ── */
/* ============================================================
   INFORME GERENCIAL (A4) — vista de exportación a PDF.
   Se renderiza siempre en el DOM (oculto en pantalla).
   <ReportRoot open/> lo muestra como vista previa; el botón
   "Descargar PDF" llama window.print() y @media print imprime
   únicamente estas hojas A4.
   ============================================================ */
const RD = window.TableroData;
const RLOGO = (window.__resources && window.__resources.markaLogo) || '../../assets/masmarka-logo.png';

/* ---------- helpers de gráficos (estáticos, aptos para print) ---------- */
function RHBar({ data, color = '#2E8FD4' }) {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div className="r-hbar">
      {data.map((d, i) => (
        <div className="r-hbar-row" key={i}>
          <span className="r-hbar-lbl">{d.label}</span>
          <div className="r-hbar-track">
            <div className="r-hbar-fill" style={{ width: (d.value / max * 100) + '%', background: d.negative ? '#B03A2E' : color }} />
          </div>
          <span className="r-hbar-val" style={{ color: d.negative ? '#B03A2E' : '#0D5C9B' }}>{d.value}</span>
        </div>
      ))}
    </div>
  );
}

function RGroupedBar({ data }) {
  const max = Math.max(...data.map(d => d.con + d.sin), 1);
  return (
    <div className="r-gbar">
      {data.map((d, i) => (
        <div className="r-gbar-col" key={i}>
          <div className="r-gbar-stack">
            <div className="r-gbar-b con" style={{ height: (d.con / max * 100) + '%' }}><span className="r-gbar-v">{d.con}</span></div>
            <div className="r-gbar-b sin" style={{ height: (d.sin / max * 100) + '%' }}><span className="r-gbar-v">{d.sin}</span></div>
          </div>
          <div className="r-gbar-lbl">{d.city}</div>
        </div>
      ))}
    </div>
  );
}

function RDonut({ data, size = 150 }) {
  const total = data.reduce((s, x) => s + x.value, 0) || 1;
  const r = (size - 18) / 2, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  let off = 0;
  return (
    <div className="r-donut">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {data.map((s, i) => {
          const frac = s.value / total, dash = frac * circ;
          const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth="18"
            strokeDasharray={`${dash.toFixed(2)} ${(circ - dash).toFixed(2)}`} strokeDashoffset={(-off * circ).toFixed(2)}
            transform={`rotate(-90 ${cx} ${cy})`} />;
          off += frac; return el;
        })}
        <text x={cx} y={cy + 5} textAnchor="middle" fontFamily="Inter" fontSize="19" fontWeight="700" fill="#0B2A4A">{total}</text>
      </svg>
      <div className="r-dl">
        {data.map((s, i) => (
          <div className="r-dl-row" key={i}><span className="r-dl-dot" style={{ background: s.color }} /><span className="r-dl-lab">{s.label}</span><b>{s.value}</b><span className="r-dl-pct">{Math.round(s.value / total * 100)}%</span></div>
        ))}
      </div>
    </div>
  );
}

function RRank({ data, deptCity }) {
  const rows = Object.entries(data).map(([name, d]) => ({ name, ...d, pct: d.total ? Math.round(d.con / d.total * 100) : 0 })).sort((a, b) => b.pct - a.pct);
  return (
    <div className="r-rank">
      {rows.map((r, i) => (
        <div className="r-rank-row" key={r.name}>
          <span className="r-rank-i">{i + 1}</span>
          <div className="r-rank-main">
            <div className="r-rank-top"><span className="r-rank-name">{r.name}</span><span className="r-rank-pct" style={{ color: '#1D4ED8' }}>{r.pct}%</span></div>
            <div className="r-rank-track"><div className="r-rank-fill" style={{ width: r.pct + '%', background: '#1D4ED8' }} /></div>
            <div className="r-rank-sub">{r.con}/{r.total} locales · {deptCity[r.name]}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ---------- envoltorio de página ---------- */
function RPage({ title, num, total, children }) {
  return (
    <div className="a4">
      <div className="a4-head">
        <div><div className="a4-eyebrow">Informe de Relevamiento</div><div className="a4-title">{title}</div></div>
        <img className="a4-logo" src={RLOGO} alt="+Marka" />

      <div className="a4-body">{children}</div>

    </div>

}

      <RPage title="Análisis de Competencia" num={4} total={TOTAL}>
        <div className="r-2col">
          <div className="r-panel">
            <div className="r-panel-h">Marcas competidoras detectadas</div>
            <div className="r-panel-b"><RHBar data={RD.competitors} color="#B03A2E" /></div>
          </div>
          <div className="r-panel">
            <div className="r-panel-h">Visibilidad vs Banco Familiar</div>
            <div className="r-panel-b"><RDonut data={RD.visibilityVsBF} /></div>
          </div>
        </div>
        <div className="r-seclbl mt">Ranking competencia por departamento</div>
        <div className="r-panel">
          <div className="r-panel-b"><RRank data={RD.deptCP} deptCity={RD.DEPT_CITY} /></div>
        </div>
      </RPage>

      {/* ---- P5 · CONCLUSIONES ---- */}
      <RPage title="Conclusiones y Recomendaciones" num={5} total={TOTAL}>
        <p className="r-lead">El relevamiento confirma una <b>posición sólida</b> de Banco Familiar en los principales centros urbanos, con oportunidades concretas de mejora en cobertura, estado del material y capacitación de encargados.</p>
        <div className="r-reco">
          <div className="r-reco-h">Acciones recomendadas</div>
          <ol>
            {recos.map((r, i) => <li key={i}>{r}</li>)}
          </ol>
        </div>
        <div className="r-seclbl mt">Resumen de cobertura</div>
        <div className="r-2col">
          <div className="r-panel"><div className="r-panel-h">Banco Familiar</div><div className="r-panel-b"><div className="r-donut"><RDonut data={[{ label: 'Con material', value: k.conBF, color: '#1D4ED8' }, { label: 'Sin material', value: k.sinBF, color: '#CBD5E1' }]} /></div></div></div>
          <div className="r-panel"><div className="r-panel-h">Competencia</div><div className="r-panel-b"><div className="r-donut"><RDonut data={[{ label: 'Con material', value: k.conCP, color: '#B03A2E' }, { label: 'Sin material', value: k.totalCP - k.conCP, color: '#CBD5E1' }]} /></div></div></div>
        </div>
      </RPage>

    </div>
  );
}

/* ---------- raíz / overlay de vista previa ---------- */
function ReportRoot({ open, onClose }) {
  return (
    <div className={'report-root' + (open ? ' open' : '')}>
      <div className="report-bar">
        <div>
          <div className="rb-title">Vista previa — Informe gerencial</div>
          <div className="rb-sub">Formato A4 · 6 páginas · listo para guardar como PDF</div>
        </div>
        <div className="rb-spacer" />
        <button className="rb-close" onClick={onClose}>Cerrar</button>
        <button className="rb-print" onClick={() => window.print()}>Descargar PDF</button>
      </div>
      <ReportDocument />
    </div>
  );
}

Object.assign(window, { ReportRoot, ReportDocument });


/* ── Wrapper component that manages open/close state ── */
function ReportRootWrapper() {
  const [open, setOpen] = React.useState(false);
  // Expose show function globally
  React.useEffect(() => {
    window.__showReport = () => setOpen(true);
  }, []);
  return React.createElement(ReportRoot, { open, onClose: () => setOpen(false) });
}
window.ReportRootWrapper = ReportRootWrapper;
</script>

</body>
</html>

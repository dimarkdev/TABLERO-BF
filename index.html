<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>+Marka — Tablero Ejecutivo · Banco Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ============================================================
   TABLERO EJECUTIVO — styles
   Built on colors_and_type tokens (inlined here for the kit).
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D5C9B;--blue:#1A7AC2;--blue-mid:#2E8FD4;--blue-700:#1D4ED8;
  --bsoft:#D6EAF8;--bpale:#EBF5FB;--bxpal:#F4FAFF;--bg:#EEF6FC;
  --yellow:#F5A800;--ysoft:#FFF8E6;--marka-red:#C0373F;
  --white:#fff;--border:#C8DFF0;--border2:#DCF0FA;
  --text:#0B2A4A;--muted:#4A7CA0;--muted2:#7EB3D4;
  --green:#1A7A4A;--gsoft:#E8F5EE;--red:#B03A2E;--rsoft:#FCEAE8;--orange:#C0600A;--osoft:#FEF3E6;
  --sh:0 2px 10px rgba(13,92,155,.08);--shm:0 6px 24px rgba(13,92,155,.13);
  --r:10px;--r-lg:14px;--sb:248px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;-webkit-font-smoothing:antialiased}
.nodata{padding:40px;text-align:center;color:var(--muted);font-size:12px}

/* ---------- SHELL ---------- */
.shell{display:flex;min-height:100vh}
.main{margin-left:var(--sb);flex:1;display:flex;flex-direction:column;min-width:0}

/* ---------- SIDEBAR ---------- */
.sb{width:var(--sb);position:fixed;left:0;top:0;height:100vh;background:linear-gradient(180deg,#0A4A80 0%,#0D5C9B 58%,#1A7AC2 100%);display:flex;flex-direction:column;z-index:50}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;align-items:flex-start;gap:9px}
.sb-logo-mark{height:24px;width:auto;filter:brightness(0) invert(1)}
.sb-brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.01em}
.sb-brand-client{font-size:9.5px;color:rgba(255,255,255,.55);margin-top:2px;text-transform:uppercase;letter-spacing:.07em}
.sb-section{padding:16px 0 6px;flex:1}
.sb-section-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.13em;padding:0 18px 9px}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 18px;color:rgba(255,255,255,.66);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border-left:3px solid transparent;user-select:none}
.sb-item .ic{opacity:.7;flex-shrink:0}
.sb-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.sb-item.active{color:#fff;background:rgba(255,255,255,.13);border-left-color:var(--yellow);font-weight:600}
.sb-item.active .ic{opacity:1}
.sb-item.hl{background:rgba(245,168,0,.12);border-left:3px solid var(--yellow);color:rgba(255,255,255,.88)}
.sb-item.hl:hover{background:rgba(245,168,0,.2)}
.sb-item.hl.active{background:rgba(245,168,0,.22);border-left-color:var(--yellow);color:#fff}
.sb-period{margin:0 14px 12px;background:rgba(255,255,255,.1);border-radius:7px;padding:7px 10px;font-size:10px;color:rgba(255,255,255,.75);text-align:center;font-weight:500}
.sb-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:9.5px;color:rgba(255,255,255,.4);line-height:1.6;display:flex;align-items:center;gap:10px}
.sb-foot-mark{height:18px;width:auto;filter:brightness(0) invert(1);opacity:.85}

/* ---------- TOPBAR ---------- */
.topbar{height:60px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 26px;gap:16px;position:sticky;top:0;z-index:40;box-shadow:var(--sh)}
.tb-title{font-size:16px;font-weight:700;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--muted);margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-badge{background:var(--navy);color:#fff;font-size:10.5px;font-weight:600;padding:5px 13px;border-radius:14px;white-space:nowrap}
.tb-btn{background:var(--white);border:1px solid var(--border);color:var(--navy);font-size:11px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s}
.tb-btn:hover{background:var(--bsoft);border-color:var(--blue-mid)}

/* ---------- PAGES ---------- */
.pages{padding:24px 26px 40px;flex:1}
@keyframes fadeUp{from{transform:translateY(14px)}to{transform:translateY(0)}}
.page{animation:fadeUp .4s ease;opacity:1;display:flex;flex-direction:column;gap:18px}
.sec-lbl{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin:6px 0 -6px}

/* ---------- SEGMENTED TABS ---------- */
.seg{display:inline-flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:5px;width:fit-content;box-shadow:var(--sh)}
.seg-tab{padding:7px 16px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-radius:7px;text-transform:uppercase;letter-spacing:.04em;transition:all .18s;user-select:none}
.seg-tab:hover{color:var(--navy);background:var(--bsoft)}
.seg-tab.active{background:var(--navy);color:#fff}

/* ---------- EXEC BANNER ---------- */
.exec{border-radius:var(--r-lg);padding:24px 26px;background:linear-gradient(125deg,#0A4A80 0%,#0D5C9B 55%,#2E8FD4 100%);position:relative;overflow:hidden;display:flex;align-items:center;gap:28px}
.exec::after{content:'';position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05)}
.exec-l{flex:1;position:relative;z-index:1}
.exec-eyebrow{font-size:9.5px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#A8D8F0;margin-bottom:7px}
.exec-head{font-size:21px;font-weight:700;color:#fff;line-height:1.3;letter-spacing:-.01em}
.exec-head b{color:var(--yellow)}
.exec-sub{font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;margin-top:9px;max-width:640px}
.exec-r{display:flex;gap:14px;position:relative;z-index:1}
.exec-stat{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:16px 20px;text-align:center;min-width:104px}
.exec-num{font-size:34px;font-weight:800;color:#fff;line-height:1}
.exec-num.warn{color:#FDE68A}
.exec-cap{font-size:9.5px;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.07em;margin-top:6px}

/* ---------- KPI GRID ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.kpi{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:15px 17px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.b::before{background:var(--blue)}.kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}.kpi.y::before{background:var(--yellow)}
.kpi-lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.kpi-val{font-size:30px;font-weight:700;color:var(--navy);line-height:1;letter-spacing:-.01em}
.kpi-sub{font-size:10.5px;margin-top:5px;font-weight:600}
.kpi-sub.pos{color:var(--green)}.kpi-sub.neg{color:var(--red)}.kpi-sub.mid{color:var(--orange)}.kpi-sub.muted{color:var(--muted);font-weight:500}

/* ---------- GRID HELPERS ---------- */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1080px){.grid-2{grid-template-columns:1fr}}

/* ---------- CARD ---------- */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.card-h{padding:11px 15px;border-bottom:1px solid var(--border2);font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;background:var(--bxpal);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-b{padding:16px;flex:1}

/* ---------- HEAT BLOCK ---------- */
.heat-block{display:grid;grid-template-columns:1.75fr 1fr;gap:14px;align-items:stretch}
@media(max-width:1080px){.heat-block{grid-template-columns:1fr}}
.heat-card .card-b.heat-b{padding:8px}
.heat-legend{display:flex;align-items:center;gap:7px}
.hl-lbl{font-size:9px;color:var(--muted);font-weight:600}
.hl-bar{width:80px;height:9px;border-radius:5px;display:inline-block}
.hmap{position:relative;width:100%}
.hmap-svg{width:100%}
.hmap-tooltip{position:fixed;display:none;background:rgba(255,255,255,.98);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:12px;pointer-events:none;z-index:200;box-shadow:var(--shm);max-width:220px}
.mt-name{font-weight:700;color:var(--navy);font-size:13px;margin-bottom:3px}
.mt-city{color:var(--muted);font-size:11px;margin-bottom:7px}
.mt-row{display:flex;justify-content:space-between;gap:14px;font-size:11px;color:var(--muted);padding:1px 0}
.mt-row b{color:var(--navy)}
.mt-pct{display:inline-block;margin-top:7px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700}

/* ---------- RANK LIST ---------- */
.rank{display:flex;flex-direction:column;gap:11px}
.rank-row{display:flex;gap:11px;align-items:flex-start}
.rank-i{width:20px;height:20px;border-radius:6px;background:var(--bpale);color:var(--navy);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rank-main{flex:1;min-width:0}
.rank-top{display:flex;justify-content:space-between;align-items:baseline}
.rank-name{font-size:12px;font-weight:600;color:var(--text)}
.rank-pct{font-size:12px;font-weight:700}
.rank-track{height:6px;border-radius:4px;overflow:hidden;margin:4px 0 3px}
.rank-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.34,1.56,.64,1)}
.rank-sub{font-size:9.5px;color:var(--muted)}

/* ---------- GROUPED BAR CHART ---------- */
.gbar{display:flex;align-items:flex-end;gap:14px;padding:18px 4px 0}
.gbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;height:100%}
.gbar-stack{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.gbar-pair{display:flex;gap:4px;align-items:flex-end;height:100%;width:100%;justify-content:center}
.gbar-b{width:46%;max-width:24px;border-radius:4px 4px 0 0;transition:height .8s cubic-bezier(.34,1.56,.64,1);position:relative;min-height:3px;display:flex;justify-content:center}
.gbar-b.con{background:var(--blue-700)}
.gbar-b.sin{background:#CBD5E1}
.gbar-v{position:absolute;top:-15px;font-size:9.5px;font-weight:700;color:var(--navy)}
.gbar-lbl{font-size:9.5px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* ---------- HORIZONTAL BAR CHART ---------- */
.hbar{display:flex;flex-direction:column;gap:13px;padding-top:2px}
.hbar-row{display:flex;align-items:center;gap:11px}
.hbar-lbl{font-size:11px;color:var(--text);width:128px;flex-shrink:0;font-weight:500}
.hbar-track{flex:1;height:14px;background:var(--bpale);border-radius:5px;overflow:hidden}
.hbar-fill{height:100%;border-radius:5px;transition:width .85s cubic-bezier(.34,1.56,.64,1)}
.hbar-val{font-size:12px;font-weight:700;min-width:26px;text-align:right}

/* ---------- DONUT ---------- */
.donut-wrap{display:flex;align-items:center;gap:18px}
.donut-legend{display:flex;flex-direction:column;gap:8px;flex:1}
.dl-row{display:flex;align-items:center;gap:8px;font-size:11.5px}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dl-label{color:var(--muted);flex:1}
.dl-val{color:var(--navy);font-weight:700}
.dl-pct{color:var(--muted2);font-size:10px;min-width:30px;text-align:right}

/* ---------- LEGEND ROW ---------- */
.legrow{display:flex;gap:16px;margin-bottom:6px}
.leg-chip{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--muted);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:3px}

/* ---------- TAGS ---------- */
.tag{padding:3px 9px;border-radius:6px;font-size:9.5px;font-weight:600;letter-spacing:.03em;white-space:nowrap}
.t-g{background:var(--gsoft);color:#145A35}.t-r{background:var(--rsoft);color:#921F1F}
.t-o{background:var(--osoft);color:#994D08}.t-y{background:var(--ysoft);color:#7A5500}
.t-b{background:var(--bsoft);color:#0D4A7A}.t-gr{background:var(--bpale);color:var(--muted)}

/* ---------- FILTER BAR ---------- */
.filterbar{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh)}
.fl{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.fs{border:1px solid var(--border);border-radius:7px;padding:6px 11px;font-size:11.5px;color:var(--navy);background:var(--bxpal);font-family:inherit;cursor:pointer}
.fs:focus{outline:none;border-color:var(--blue)}
.rc{font-size:11px;color:var(--muted);margin-left:auto;font-weight:600}

/* ---------- LOCAL ACCORDION ---------- */
.lg{display:flex;flex-direction:column;gap:8px}
.lc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:border-color .18s}
.lc:hover{border-color:var(--blue-mid)}
.lh{padding:12px 15px;display:flex;align-items:center;gap:9px;cursor:pointer;flex-wrap:wrap}
.lh:hover{background:var(--bxpal)}
.li{flex:1;min-width:140px}
.ln{font-size:13px;font-weight:600;color:var(--navy)}
.lci{font-size:10.5px;color:var(--muted);margin-top:2px}
.chv{margin-left:auto;color:var(--muted2);transition:transform .2s;font-size:11px}
.chv.open{transform:rotate(180deg)}
.lb{padding:0 15px 15px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;border-top:1px solid var(--border2);padding-top:12px;margin-bottom:12px}
.dk{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.dv{font-size:12px;color:var(--navy);font-weight:500}
.pl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.pg{display:flex;gap:8px;flex-wrap:wrap}
.pt{width:104px;height:72px;border-radius:7px;background:linear-gradient(135deg,var(--bsoft),var(--bpale));border:1px solid var(--border)}
.pp{width:104px;height:72px;border-radius:7px;background:var(--bxpal);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:9.5px;color:var(--muted2)}

/* ---------- EVIDENCIAS ---------- */
.daytabs{display:flex;gap:7px;flex-wrap:wrap}
.daytab{padding:7px 16px;font-size:11px;font-weight:600;color:var(--muted);background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s}
.daytab:hover{background:var(--bsoft);color:var(--navy)}
.daytab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.ev-link{font-size:10.5px;font-weight:600;color:var(--blue);text-decoration:none}
.ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.ev-cell{display:flex;flex-direction:column;gap:6px}
.ev-thumb{aspect-ratio:4/3;border-radius:8px;background:linear-gradient(135deg,var(--bsoft),var(--bpale));border:1px solid var(--border)}
.ev-cap{font-size:10px;color:var(--muted)}
.ev-hint{margin-top:14px;padding:11px 14px;background:var(--bsoft);border-radius:8px;font-size:11px;color:var(--navy);line-height:1.6}


/* ── EXTRA STYLES for detail photos & drive evidence ─── */
.di-fotos { display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }
.di-thumb {
  width:104px; height:72px; border-radius:7px; overflow:hidden;
  background:linear-gradient(135deg,var(--bsoft),var(--bpale));
  border:1px solid var(--border); cursor:pointer; flex-shrink:0;
  transition:border-color .15s;
}
.di-thumb:hover { border-color:var(--blue-mid); }
.di-thumb img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s; }
.di-thumb:hover img { transform:scale(1.08); }
.ev-grid-real { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:12px; }
.ev-card {
  background:var(--white); border:1px solid var(--border); border-radius:var(--r);
  box-shadow:var(--sh); overflow:hidden; transition:border-color .18s;
}
.ev-card:hover { border-color:var(--blue-mid); }
.ev-card-hd { padding:11px 14px; border-bottom:1px solid var(--border2); }
.ev-local { font-size:12.5px; font-weight:700; color:var(--navy); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ev-meta { font-size:10px; color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.ev-photos { display:grid; gap:1px; }
.ev-photos.n1 { grid-template-columns:1fr; }
.ev-photos.n2 { grid-template-columns:1fr 1fr; }
.ev-photos.n3,.ev-photos.nmore { grid-template-columns:1fr 1fr 1fr; }
.photo-t {
  position:relative; aspect-ratio:4/3; background:var(--bpale);
  overflow:hidden; cursor:pointer;
}
.photo-t img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s; }
.photo-t:hover img { transform:scale(1.06); }
.photo-t-ov {
  position:absolute; inset:0; background:rgba(13,92,155,0);
  display:flex; align-items:center; justify-content:center; transition:background .2s;
}
.photo-t:hover .photo-t-ov { background:rgba(13,92,155,.32); }
.ph-icon {
  opacity:0; transition:opacity .2s; background:rgba(255,255,255,.9);
  border-radius:50%; width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
}
.photo-t:hover .ph-icon { opacity:1; }
.more-n { position:absolute; inset:0; background:rgba(13,92,155,.58); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:800; }
.ev-foot { padding:8px 14px; display:flex; gap:6px; flex-wrap:wrap; }
.ev-link-btn {
  display:inline-flex; align-items:center; gap:4px; padding:4px 10px;
  font-size:10px; font-weight:600; background:var(--bxpal);
  border:1px solid var(--border); color:var(--navy); border-radius:5px;
  text-decoration:none; transition:background .15s;
}
.ev-link-btn:hover { background:var(--bsoft); }
/* Lightbox */
#lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:2000; align-items:center; justify-content:center; padding:20px; }
#lb.open { display:flex; }
.lb-in { position:relative; }
.lb-close { position:absolute; top:-12px; right:-12px; background:var(--yellow); color:#0A4A80; border:none; border-radius:50%; width:28px; height:28px; font-size:14px; cursor:pointer; font-weight:800; display:flex; align-items:center; justify-content:center; z-index:10; }
.lb-frame { width:min(780px,84vw); height:min(560px,72vh); border:none; border-radius:var(--r); background:#0A4A80; }
.lb-nav { display:flex; gap:10px; justify-content:center; margin-top:12px; }
.lb-btn { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); color:#fff; padding:7px 18px; border-radius:7px; cursor:pointer; font-size:12px; font-family:Inter,sans-serif; transition:background .15s; }
.lb-btn:hover { background:rgba(255,255,255,.2); }
.lb-btn.prim { background:var(--yellow); color:#0A4A80; font-weight:700; border-color:var(--yellow); }
.lb-info { text-align:center; color:rgba(255,255,255,.5); font-size:11px; margin-top:8px; }
/* Filter bar extras */
.ev-filter-row { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.ev-search { border:1px solid var(--border); border-radius:7px; padding:6px 11px; font-size:11.5px; color:var(--navy); background:var(--bxpal); font-family:Inter,sans-serif; outline:none; min-width:180px; }
.ev-search:focus { border-color:var(--blue); }
.ev-sub-tabs { display:flex; gap:6px; margin-bottom:14px; }
.ev-tab { padding:7px 16px; font-size:11px; font-weight:600; color:var(--muted); background:var(--white); border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all .18s; }
.ev-tab:hover { background:var(--bsoft); color:var(--navy); }
.ev-tab.active { background:var(--navy); color:#fff; border-color:var(--navy); }
.rc-right { font-size:11px; color:var(--muted); margin-left:auto; font-weight:600; }

/* ── REPORT A4 (verbatim from design system) ── */
/* ============================================================
   INFORME GERENCIAL — layout A4 + reglas de impresión
   El informe vive siempre en el DOM. En pantalla está oculto;
   se muestra como overlay de vista previa al pulsar "Exportar PDF",
   y en @media print SOLO se imprime el informe (no el tablero).
   ============================================================ */

/* ---------- PANTALLA: oculto salvo vista previa ---------- */
.report-root { display: none; }
.report-root.open {
  display: block; position: fixed; inset: 0; z-index: 2000;
  background: #51606E; overflow: auto;
}

/* barra superior de la vista previa */
.report-bar {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 22px; background: #0A4A80;
  box-shadow: 0 2px 14px rgba(0,0,0,.35);
}
.report-bar .rb-title { color: #fff; font-size: 13px; font-weight: 600; }
.report-bar .rb-sub { color: rgba(255,255,255,.6); font-size: 11px; }
.report-bar .rb-spacer { flex: 1; }
.report-bar button {
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 9px 18px; border-radius: 8px; cursor: pointer; border: 1px solid transparent;
  transition: all .15s;
}
.report-bar .rb-print { background: #F5A800; color: #5C4000; }
.report-bar .rb-print:hover { background: #ffba1f; }
.report-bar .rb-close { background: transparent; color: #fff; border-color: rgba(255,255,255,.3); }
.report-bar .rb-close:hover { background: rgba(255,255,255,.12); }

/* contenedor de páginas en pantalla */
.report-pages { padding: 28px 0 48px; display: flex; flex-direction: column; align-items: center; gap: 24px; }

/* ---------- HOJA A4 ---------- */
.a4 {
  width: 210mm; min-height: 297mm; background: #fff;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  color: #0B2A4A; font-family: 'Inter', sans-serif;
  -webkit-print-color-adjust: exact; print-color-adjust: exact;
}

/* encabezado de página */
.a4-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 16mm 16mm 0;
}
.a4-eyebrow { font-size: 8.5pt; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #4A7CA0; }
.a4-title { font-size: 19pt; font-weight: 700; color: #0D5C9B; letter-spacing: -.01em; margin-top: 4px; }
.a4-logo { height: 26px; width: auto; }
.a4-rule { height: 3px; background: linear-gradient(90deg,#0D5C9B,#2E8FD4 60%,#F5A800); margin: 10px 16mm 0; border-radius: 2px; }

.a4-body { flex: 1; padding: 9mm 16mm 0; }

.a4-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16mm 12mm; margin-top: auto;
  font-size: 8pt; color: #7EB3D4; border-top: 1px solid #DCF0FA; padding-top: 6px;
}
.a4-foot span:first-child { color: #4A7CA0; font-weight: 500; }

/* ---------- PORTADA ---------- */
.a4.cover {
  background: linear-gradient(150deg,#0A4A80 0%,#0D5C9B 52%,#2E8FD4 100%);
  color: #fff; padding: 0;
}
.cover-inner { flex: 1; display: flex; flex-direction: column; padding: 30mm 22mm; position: relative; z-index: 1; }
.cover::after { content:''; position:absolute; right:-80px; top:-80px; width:340px; height:340px; border-radius:50%; background:rgba(255,255,255,.06); }
.cover::before { content:''; position:absolute; left:-60px; bottom:60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.05); }
.cover-logo { height: 38px; width: auto; align-self: flex-start; filter: brightness(0) invert(1); }
.cover-eyebrow { margin-top: auto; font-size: 10pt; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: #A8D8F0; }
.cover-title { font-size: 34pt; font-weight: 800; line-height: 1.1; letter-spacing: -.01em; margin-top: 10px; max-width: 14ch; }
.cover-sub { font-size: 13pt; color: rgba(255,255,255,.85); margin-top: 16px; font-weight: 500; }
.cover-meta { margin-top: 34px; display: flex; gap: 36px; }
.cover-meta .cm-k { font-size: 8.5pt; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.55); }
.cover-meta .cm-v { font-size: 12pt; font-weight: 700; color: #fff; margin-top: 3px; }
.cover-foot { margin-top: 30px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.18); font-size: 8.5pt; color: rgba(255,255,255,.6); line-height: 1.6; }

/* ---------- BLOQUES DE CONTENIDO ---------- */
.r-lead { font-size: 11.5pt; line-height: 1.65; color: #0B2A4A; margin-bottom: 8mm; }
.r-lead b { color: #0D5C9B; }
.r-seclbl { font-size: 9pt; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #4A7CA0; margin: 0 0 4mm; }
.r-seclbl.mt { margin-top: 9mm; }

/* KPIs */
.r-kpis { display: grid; grid-template-columns: repeat(5,1fr); gap: 4mm; }
.r-kpi { border: 1px solid #C8DFF0; border-radius: 9px; padding: 14px 13px; position: relative; overflow: hidden; }
.r-kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.r-kpi.b::before{background:#1A7AC2}.r-kpi.g::before{background:#1A7A4A}.r-kpi.r::before{background:#B03A2E}.r-kpi.y::before{background:#F5A800}
.r-kpi .k-l { font-size: 8pt; text-transform: uppercase; letter-spacing: .06em; color: #4A7CA0; }
.r-kpi .k-v { font-size: 27pt; font-weight: 800; color: #0D5C9B; line-height: 1; margin-top: 8px; }
.r-kpi .k-s { font-size: 8.5pt; font-weight: 600; margin-top: 5px; }
.r-kpi .k-s.pos{color:#1A7A4A}.r-kpi .k-s.neg{color:#B03A2E}.r-kpi .k-s.mid{color:#C0600A}.r-kpi .k-s.mut{color:#7EB3D4}

/* hallazgos clave */
.r-find { display: flex; flex-direction: column; gap: 4mm; }
.r-find-row { display: flex; gap: 11px; align-items: flex-start; font-size: 10.5pt; line-height: 1.5; }
.r-find-row .fi { width: 20px; height: 20px; border-radius: 5px; background: #EBF5FB; color: #0D5C9B; font-size: 9pt; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.r-find-row b { color: #0D5C9B; }

/* dos columnas */
.r-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 7mm; }
.r-panel { border: 1px solid #C8DFF0; border-radius: 9px; overflow: hidden; }
.r-panel-h { background: #F4FAFF; border-bottom: 1px solid #DCF0FA; padding: 9px 13px; font-size: 8.5pt; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #0D5C9B; }
.r-panel-b { padding: 14px; }

/* barras horizontales */
.r-hbar { display: flex; flex-direction: column; gap: 11px; }
.r-hbar-row { display: flex; align-items: center; gap: 10px; }
.r-hbar-lbl { font-size: 9.5pt; width: 100px; flex-shrink: 0; color: #0B2A4A; font-weight: 500; }
.r-hbar-track { flex: 1; height: 16px; background: #EBF5FB; border-radius: 5px; overflow: hidden; }
.r-hbar-fill { height: 100%; border-radius: 5px; }
.r-hbar-val { font-size: 10.5pt; font-weight: 700; width: 24px; text-align: right; }

/* barras agrupadas con/sin */
.r-gbar { display: flex; align-items: flex-end; gap: 11px; height: 200px; padding-top: 18px; }
.r-gbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; height: 100%; }
.r-gbar-stack { flex: 1; width: 100%; display: flex; align-items: flex-end; justify-content: center; gap: 4px; }
.r-gbar-b { width: 44%; max-width: 24px; border-radius: 4px 4px 0 0; position: relative; min-height: 2px; }
.r-gbar-b.con { background: #1D4ED8; } .r-gbar-b.sin { background: #CBD5E1; }
.r-gbar-v { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 8pt; font-weight: 700; color: #0B2A4A; }
.r-gbar-lbl { font-size: 8pt; color: #4A7CA0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

/* ranking */
.r-rank { display: flex; flex-direction: column; gap: 9px; }
.r-rank-row { display: flex; gap: 10px; align-items: flex-start; }
.r-rank-i { width: 19px; height: 19px; border-radius: 5px; background: #EBF5FB; color: #0D5C9B; font-size: 8.5pt; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.r-rank-main { flex: 1; }
.r-rank-top { display: flex; justify-content: space-between; align-items: baseline; }
.r-rank-name { font-size: 9.5pt; font-weight: 600; }
.r-rank-pct { font-size: 9.5pt; font-weight: 800; }
.r-rank-track { height: 6px; border-radius: 3px; background: #EBF5FB; overflow: hidden; margin: 3px 0 2px; }
.r-rank-fill { height: 100%; border-radius: 3px; }
.r-rank-sub { font-size: 7.5pt; color: #7EB3D4; }

/* donut */
.r-donut { display: flex; align-items: center; gap: 18px; }
.r-dl { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.r-dl-row { display: flex; align-items: center; gap: 8px; font-size: 9.5pt; }
.r-dl-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.r-dl-lab { color: #4A7CA0; flex: 1; }
.r-dl-row b { color: #0D5C9B; }
.r-dl-pct { color: #7EB3D4; font-size: 8.5pt; width: 30px; text-align: right; }

/* leyenda */
.r-leg { display: flex; gap: 14px; margin-bottom: 8px; }
.r-leg-chip { display: flex; align-items: center; gap: 6px; font-size: 8pt; color: #4A7CA0; font-weight: 500; }
.r-leg-dot { width: 8px; height: 8px; border-radius: 3px; }

/* recomendaciones */
.r-reco { border: 1px solid #C8DFF0; border-radius: 9px; padding: 14px 16px; background: #F4FAFF; }
.r-reco-h { font-size: 9pt; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #0D5C9B; margin-bottom: 9px; }
.r-reco ol { margin: 0; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; }
.r-reco li { font-size: 10pt; line-height: 1.5; color: #0B2A4A; }
.r-reco li b { color: #0D5C9B; }

/* ---------- IMPRESIÓN ---------- */
@media print {
  @page { size: A4 portrait; margin: 0; }
  html, body { background: #fff !important; }
  .shell, .report-bar { display: none !important; }
  .report-root { display: block !important; position: static !important; background: #fff !important; overflow: visible !important; }
  .report-pages { padding: 0 !important; gap: 0 !important; display: block !important; }
  .a4 { box-shadow: none !important; margin: 0 !important; width: 210mm !important; min-height: 297mm; page-break-after: always; break-after: page; }
  .a4:last-child { page-break-after: auto; break-after: auto; }
}

</style>

  tiendasOT:     "RE_BF_TIENDAS_OT",
  gastroCentral: "RE_BF_GASTRO_CENTRAL",
};

/* opensheet returns row-0 as keys.
   GASTRO & COMPE have a section-label row 0 → real headers are in row 1 values.
   TIENDAS has real headers in row 0. */
function normalizeSheet(rows) {
  if (!rows.length) return rows;
  const firstVals = Object.values(rows[0]).map(v => v == null ? "" : String(v).trim());
  if (firstVals.includes("FECHA") && firstVals.includes("LOCAL")) {
    const oldKeys = Object.keys(rows[0]);
    const newKeys = firstVals.map((v, i) => v || oldKeys[i] || ("COL_" + i));
    return rows.slice(1)
      .map(row => {
        const vals = Object.values(row);
        const obj = {};
        newKeys.forEach((k, i) => { obj[k] = vals[i] != null ? vals[i] : ""; });
        return obj;
      })
      .filter(row => Object.values(row).some(v => v !== "" && v !== null));
  }
  return rows;
}

const N   = v => v == null ? "" : String(v).trim();
const YES = v => { const u = N(v).toUpperCase(); return u==="SI"||u==="SÍ"||u==="YES"||u==="1"||u==="TRUE"||u==="SÍ, LA CONOCE BIEN"||u.startsWith("SI,"); };
const uniq = a => [...new Set(a.map(v => N(v)).filter(Boolean))].sort();

function buildTableroData(rawG, rawC, rawT, rawOT=[], rawGC=[]) {
  /* ── deptBF ── */
  const deptBF = {}, deptCP = {};
  rawG.forEach(r => {
    const dept = CITY_DEPT[N(r.CIUDAD)] || N(r.CIUDAD);
    if (!dept) return;
    if (!deptBF[dept]) deptBF[dept] = { total:0, con:0 };
    deptBF[dept].total++;
    if (YES(r.HAY_MATERIAL_DESIGNADO)) deptBF[dept].con++;
  });
  rawC.forEach(r => {
    const dept = CITY_DEPT[N(r.CIUDAD)] || N(r.CIUDAD);
    if (!dept) return;
    if (!deptCP[dept]) deptCP[dept] = { total:0, con:0 };
    deptCP[dept].total++;
    if (YES(r.HAY_MATERIAL_COMPETENCIA)) deptCP[dept].con++;
  });

  /* ── cityBF ── */
  const cityMap = {};
  rawG.forEach(r => {
    const c = N(r.CIUDAD); if (!c) return;
    if (!cityMap[c]) cityMap[c] = { con:0, sin:0 };
    YES(r.HAY_MATERIAL_DESIGNADO) ? cityMap[c].con++ : cityMap[c].sin++;
  });
  const cityBF = Object.entries(cityMap)
    .sort((a,b) => (b[1].con+b[1].sin) - (a[1].con+a[1].sin))
    .map(([city,d]) => ({
      city: city.replace("Encarnacion","Encarnación").replace("Concepcion","Concepción"),
      con: d.con, sin: d.sin
    }));

  /* ── materialType ── */
  const typeMap = {};
  rawG.forEach(r => {
    const v = N(r.TIPO_MATERIAL_ENCONTRADO || r.TIPO_MATERIAL_ASIGNADO);
    if (v && YES(r.HAY_MATERIAL_DESIGNADO)) typeMap[v] = (typeMap[v]||0) + 1;
  });
  const sinMat = rawG.filter(r => !YES(r.HAY_MATERIAL_DESIGNADO)).length;
  const materialType = Object.entries(typeMap)
    .sort((a,b) => b[1]-a[1]).slice(0,5)
    .map(([label,value]) => ({ label, value }));
  materialType.push({ label:"Sin material", value:sinMat, negative:true });

  /* ── materialPhysType: materiales FÍSICOS colocados en Interior ──
     (no confundir con materialType, que es el tipo de OFERTA asignada).
     Sale de MATERIAL_CORRESPONDE_TIPO, puede traer varios materiales
     separados por coma. Se normaliza el formato de paréntesis para que
     coincida con el mismo material reportado en Central (ej. "Tabletent
     mostrador (18x25cm)" en Interior = "Tabletent mostrador 18x25cm" en Central). */
  const physMap = {};
  rawG.forEach(r => {
    if (!YES(r.HAY_MATERIAL_DESIGNADO)) return;
    const raw = N(r.MATERIAL_CORRESPONDE_TIPO);
    if (!raw) return;
    raw.split(",").forEach(m => { const v = m.replace(/[()]/g,"").replace(/\s+/g," ").trim(); if (v) physMap[v] = (physMap[v]||0) + 1; });
  });
  const materialPhysType = Object.entries(physMap).sort((a,b)=>b[1]-a[1]).slice(0,8)
    .map(([label,value])=>({label,value}));
  materialPhysType.push({ label:"Sin material", value:sinMat, negative:true });

  /* ── materialState ── */
  const stateMap = {};
  rawG.filter(r => YES(r.HAY_MATERIAL_DESIGNADO)).forEach(r => {
    const v = N(r.BENEFICIO_EXHIBIDO || r.ESTADO_MATERIAL);
    if (v) stateMap[v] = (stateMap[v]||0) + 1;
  });
  const STATE_COLORS = {
    "Si, en perfecto estado":"#1D4ED8","Si, en buen estado":"#1D4ED8",
    "Visible pero deteriorado":"#F59E0B","Poco visible / mal ubicado":"#F5A800",
    "No esta colocado":"#CBD5E1",
  };
  const materialState = Object.entries(stateMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([label,value]) => ({ label, value, color: STATE_COLORS[label]||"#94A3B8" }));

  /* ── promoKnowledge ── */
  const knowMap = {};
  rawG.forEach(r => {
    const v = N(r.ENCARGADO_CONOCE_PROMO);
    if (v) knowMap[v] = (knowMap[v]||0) + 1;
  });
  const KNOW_COLORS = {
    "Si, la conoce bien":"#1D4ED8","La conoce parcialmente":"#F59E0B",
    "No la conoce":"#EF4444","No habia encargado disponible":"#94A3B8",
  };
  const promoKnowledge = Object.entries(knowMap).map(([label,value]) => ({
    label: label==="Si, la conoce bien"?"Conoce bien":
           label==="La conoce parcialmente"?"Parcialmente":
           label==="No la conoce"?"No conoce":"Sin encargado",
    value, color: KNOW_COLORS[label]||"#94A3B8"
  }));

  /* ── competitors (gastro) ──
     El texto crudo puede venir como "Otro banco — Interfisa" (la encuesta ofrecía
     "Otro banco" + campo libre para especificar cuál). Se limpia el prefijo y se
     normaliza (case, puntuación final, espacios) para no duplicar la misma marca
     bajo variantes de formato distintas.
     Además, algunas filas cargan varias marcas separadas por espacios múltiples
     en vez de coma (ej. "Ueno Bank   Progresar" o "Dinelco    Cabal   Panal   Ueno pay"
     son en realidad marcas distintas pegadas por error de carga), y otras veces se
     escribió la descripción de la promo pegada al nombre de la entidad
     (ej. "Progresar viernes sábado y domingo 20%"). Se recorta todo lo que venga
     después de un día de la semana o un porcentaje, para quedarnos solo con el
     nombre de la entidad. */
  const KNOWN_TYPOS = { "bueno bank": "Ueno Bank", "ueno bank": "Ueno Bank" };
  const PROMO_TAIL = /\s+(lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado|domingo|\d+\s*%).*$/i;
  const cleanBrandName = raw => {
    let s = N(raw);
    s = s.replace(PROMO_TAIL, "");             // saca descripciones de promo pegadas
    s = s.replace(/\.+$/, "").trim();          // saca puntos finales sueltos
    s = s.replace(/\s+/g, " ").trim();
    return s;
  };
  const marcaMap = {}, marcaDisplay = {};
  rawC.forEach(r => {
    if (N(r.MARCAS_IDENTIFICADAS)) {
      N(r.MARCAS_IDENTIFICADAS).split(",").forEach(piece => {
        let s = N(piece);
        s = s.replace(/^\s*otro\s*banco\s*[—\-:]*\s*/i, "");
        s.split(/\s{2,}/).forEach(tok => {
          const clean = cleanBrandName(tok);
          if (!clean) return;
          const lower = clean.toLowerCase();
          const finalLabel = KNOWN_TYPOS[lower] || clean;
          const key = finalLabel.toLowerCase();
          marcaMap[key] = (marcaMap[key]||0) + 1;
          if (!marcaDisplay[key]) marcaDisplay[key] = finalLabel;
        });
      });
    }
  });
  const competitors = Object.entries(marcaMap).sort((a,b)=>b[1]-a[1]).slice(0,8)
    .map(([key,value]) => ({ label: marcaDisplay[key], value }));

  /* ── visibilityVsBF ──
     Compara, local por local, qué tan visible está el material de la marca
     competidora frente al material de Banco Familiar en ese mismo punto de venta.
     Se adjuntan hasta 3 observaciones reales del relevamiento por categoría,
     para poder mostrarlas al pasar el mouse sobre el gráfico. */
  const visMap = {}, visComments = { "Menos visible que BF":[], "Visibilidad similar":[], "Más visible que BF":[] };
  const visKeyOf = v => v==="Menos visible que Banco Familiar" ? "Menos visible que BF"
                       : v==="Visibilidad similar a Banco Familiar" ? "Visibilidad similar"
                       : (v==="Mas visible que Banco Familiar"||v==="Más visible que Banco Familiar") ? "Más visible que BF"
                       : null;
  rawC.forEach(r => {
    const raw = N(r.VISIBILIDAD_VS_BF); if (!raw) return;
    const k2 = visKeyOf(raw); if (!k2) return;
    visMap[raw] = (visMap[raw]||0) + 1;
    const obs = N(r.OBSERVACIONES);
    if (obs && visComments[k2].length < 3) visComments[k2].push(obs.length>140?obs.slice(0,140)+"…":obs);
  });
  const visibilityVsBF = [
    { label:"Menos visible que BF",  value: visMap["Menos visible que Banco Familiar"]||0,  color:"#1D4ED8", comments: visComments["Menos visible que BF"] },
    { label:"Visibilidad similar",   value: visMap["Visibilidad similar a Banco Familiar"]||0, color:"#F59E0B", comments: visComments["Visibilidad similar"] },
    { label:"Más visible que BF",    value: visMap["Mas visible que Banco Familiar"]||visMap["Más visible que Banco Familiar"]||0, color:"#DC2626", comments: visComments["Más visible que BF"] },
  ].filter(x => x.value > 0);

  /* ── locales (gastro detail) ── */
  const fixCityName = c => N(c).replace("Encarnacion","Encarnación").replace("Concepcion","Concepción");
  const locales = rawG.map(r => ({
    name: N(r.LOCAL), city: fixCityName(r.CIUDAD),
    type: N(r.TIPO_LOCAL)||"—",
    material: YES(r.HAY_MATERIAL_DESIGNADO),
    physTypes: N(r.MATERIAL_CORRESPONDE_TIPO).split(",").map(m=>m.replace(/[()]/g,"").replace(/\s+/g," ").trim()).filter(Boolean),
    state: N(r.BENEFICIO_EXHIBIDO||r.ESTADO_MATERIAL)||"—",
    knows: N(r.ENCARGADO_CONOCE_PROMO)==="Si, la conoce bien"?"Conoce bien":
           N(r.ENCARGADO_CONOCE_PROMO).includes("parcial")?"Parcialmente":
           N(r.ENCARGADO_CONOCE_PROMO).includes("No la")?"No conoce":
           N(r.ENCARGADO_CONOCE_PROMO).includes("encargado")?"Sin encargado":"—",
    benefit: N(r.MATERIALES_COLOCADOS)||"—",
    obs: N(r.OBSERVACIONES),
    fotos: ["FOTO_MATERIAL_1","FOTO_MATERIAL_2","FOTO_MATERIAL_3","FOTO_AUSENCIA","FOTO_ANTERIOR_1"]
           .map(k=>N(r[k])).filter(Boolean),
  }));

  /* ── tiendas ── */
  const T_ESTADO = "ESTADO MATERIAL", T_MAT = "MATERIAL ENCONTRADO",
        T_COMP = "MATERIAL COMPETENCIA", T_CONOCE = "ENCARGADO CONOCE PROMO",
        T_LOCAL = "LOCAL", T_OBS = "OBSERVACIONES";

  const estadoMap = {};
  rawT.forEach(r => { const v=N(r[T_ESTADO]); if(v) estadoMap[v]=(estadoMap[v]||0)+1; });
  const estadoTiendas = Object.entries(estadoMap).sort((a,b)=>b[1]-a[1])
    .map(([label,value]) => ({ label, value }));

  const bancoMap = {};
  rawT.forEach(r => {
    const v = N(r[T_COMP]);
    if (v && v!=="No" && v!=="") v.split(",").forEach(b=>{ const bk=b.trim(); if(bk) bancoMap[bk]=(bancoMap[bk]||0)+1; });
  });
  const tiendasBancos = Object.entries(bancoMap).sort((a,b)=>b[1]-a[1]).slice(0,6)
    .map(([label,value]) => ({ label, value }));

  const localesTiendas = rawT.map(r => ({
    name: N(r[T_LOCAL]),
    material: N(r[T_MAT])!=="Ninguno" && N(r[T_MAT])!=="",
    state: N(r[T_ESTADO])||"—",
    knows: N(r[T_CONOCE])==="Sí"||N(r[T_CONOCE])==="Si"?"Conoce bien":
           N(r[T_CONOCE])==="No"?"No conoce":"—",
    comp: N(r[T_COMP])||"—",
    obs: N(r[T_OBS]),
    fotos: Object.keys(r).filter(k=>k.toUpperCase().startsWith("FOTO BF")).map(k=>N(r[k])).filter(Boolean),
    fotos_comp: Object.keys(r).filter(k=>k.toUpperCase().startsWith("FOTO COMP")).map(k=>N(r[k])).filter(Boolean),
  }));

  /* ── KPIs ── */
  const totalBF  = rawG.length;
  const conBF    = rawG.filter(r=>YES(r.HAY_MATERIAL_DESIGNADO)).length;
  const totalCP  = rawC.length;
  const conCP    = rawC.filter(r=>YES(r.HAY_MATERIAL_COMPETENCIA)).length;
  const knowsWell= rawG.filter(r=>N(r.ENCARGADO_CONOCE_PROMO)==="Si, la conoce bien").length;
  const perfect  = (materialState.find(s=>s.label==="En perfecto estado")||
                    materialState.find(s=>s.label.includes("perfecto"))||{value:0}).value;
  const tTotal   = rawT.length;
  const tConMat  = rawT.filter(r=>N(r[T_MAT])!=="Ninguno"&&N(r[T_MAT])!=="").length;
  const tVisible = rawT.filter(r=>{const v=N(r[T_ESTADO]).toLowerCase();return v.includes("visible desde")||v.includes("sí, visible");}).length;
  const tConoce  = rawT.filter(r=>N(r[T_CONOCE])==="Sí"||N(r[T_CONOCE])==="Si").length;
  const tConComp = rawT.filter(r=>N(r[T_COMP])!=="No"&&N(r[T_COMP])!=="").length;
  const depts    = Object.keys(deptBF).length;

  /* ── deptGC (Central por departamento para el mapa) ── */
  const CITY_DEPT_LOWER = Object.fromEntries(Object.entries(CITY_DEPT).map(([k,v])=>[k.toLowerCase(),v]));
  const cityToDept = city => {
    if (!city) return null;
    return CITY_DEPT[city] || CITY_DEPT_LOWER[city.toLowerCase()] || null;
  };
  const deptGC = {};
  rawGC.forEach(r => {
    const rawCity = N(r["CIUDAD"]||r["Ciudad"]);
    const dept = cityToDept(rawCity);
    if (!dept) return;
    if (!deptGC[dept]) deptGC[dept] = { total:0, con:0 };
    deptGC[dept].total++;
    if (YES(N(r["HAY_MATERIAL_DESIGNADO"]))) deptGC[dept].con++;
  });

  /* ── gastro CENTRAL ── */
  const GC_LOCAL  = r => N(r["LOCAL"] || r["Local"]);
  const GC_CIUDAD = r => { const c = N(r["CIUDAD"]||r["Ciudad"]); return c ? c.charAt(0).toUpperCase()+c.slice(1).toLowerCase() : ''; };
  const GC_MAT    = r => N(r["HAY_MATERIAL_DESIGNADO"]);
  const GC_TIPO   = r => N(r["¿Qué tipo de oferta corresponde a este local?"] || r["TIPO_MATERIAL"] || r["OFERTA_EXHIBIDA_CORRECTA"]);
  const GC_BENE   = r => N(r["BENEFICIO_EXHIBIDO"]);
  const GC_OBS    = r => N(r["Observaciones"] || r["OBSERVACIONES"]);
  const GC_FOTO   = r => {
    /* busca cualquier key que contenga "foto" (case-insensitive, ignora espacios) */
    const fotoKey = Object.keys(r).find(k => k.trim().toLowerCase().includes('foto'));
    return fotoKey ? N(r[fotoKey]) : null;
  };
  const GC_FECHA  = r => N(r["FECHA DE LA ENCUESTA"] || r["Marca temporal"]);

  const gcPeriod = "Abril 2026";

  const gcCityMap = {};
  rawGC.forEach(r => {
    const c = GC_CIUDAD(r); if (!c) return;
    if (!gcCityMap[c]) gcCityMap[c] = { con:0, sin:0 };
    YES(GC_MAT(r)) ? gcCityMap[c].con++ : gcCityMap[c].sin++;
  });
  const gcCityBF = Object.entries(gcCityMap)
    .sort((a,b) => (b[1].con+b[1].sin)-(a[1].con+a[1].sin))
    .map(([city,d]) => ({ city, con:d.con, sin:d.sin }));

  const gcTypeMap = {};
  rawGC.forEach(r => { if(YES(GC_MAT(r))) { const v=GC_TIPO(r)||GC_BENE(r); if(v) gcTypeMap[v]=(gcTypeMap[v]||0)+1; } });
  const gcSinMat = rawGC.filter(r=>!YES(GC_MAT(r))).length;
  const gcMaterialType = Object.entries(gcTypeMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([label,value])=>({label,value}));
  gcMaterialType.push({label:"Sin material",value:gcSinMat,negative:true});

  /* ── gcMaterialPhysType: materiales FÍSICOS colocados en Central ──
     (no confundir con gcMaterialType, que es el tipo de OFERTA asignada).
     Sale de MATERIAL_CORRESPONDE_TIPO_A / _B: en cada fila solo una de las
     dos columnas viene completa (cartel, tabletent, saliente, calco, etc.),
     puede traer varios materiales separados por coma. */
  const normMat = s => N(s).replace(/[()]/g, "").replace(/\s+/g, " ").trim();
  const gcPhysMap = {};
  rawGC.forEach(r => {
    if (!YES(GC_MAT(r))) return;
    const raw = N(r["MATERIAL_CORRESPONDE_TIPO_A"]) || N(r["MATERIAL_CORRESPONDE_TIPO_B"]);
    if (!raw) return;
    raw.split(",").forEach(m => { const v = normMat(m); if (v) gcPhysMap[v] = (gcPhysMap[v]||0) + 1; });
  });
  const gcMaterialPhysType = Object.entries(gcPhysMap).sort((a,b)=>b[1]-a[1]).slice(0,8)
    .map(([label,value])=>({label,value}));
  gcMaterialPhysType.push({label:"Sin material",value:gcSinMat,negative:true});

  const gcStateMap = {};
  rawGC.filter(r=>YES(GC_MAT(r))).forEach(r=>{ const v=GC_BENE(r); if(v) gcStateMap[v]=(gcStateMap[v]||0)+1; });
  const gcMaterialState = Object.entries(gcStateMap).sort((a,b)=>b[1]-a[1])
    .map(([label,value])=>({label,value,color:"#1D4ED8"}));

  const gcLocales = rawGC.map(r=>({
    name: GC_LOCAL(r), city: GC_CIUDAD(r),
    material: YES(GC_MAT(r)),
    physTypes: (N(r["MATERIAL_CORRESPONDE_TIPO_A"])||N(r["MATERIAL_CORRESPONDE_TIPO_B"])).split(",").map(m=>normMat(m)).filter(Boolean),
    state: GC_BENE(r)||"—",
    obs: GC_OBS(r),
    fotos: Object.keys(r).filter(k=>k.trim().toLowerCase().includes('foto')).map(k=>N(r[k])).filter(Boolean),
  }));

  const gcTotal   = rawGC.length;
  const gcConMat  = rawGC.filter(r=>YES(GC_MAT(r))).length;
  const gcSinMatK = gcTotal - gcConMat;
  const gcCovPct  = gcTotal>0 ? Math.round(gcConMat/gcTotal*100) : 0;

  /* ── GLOBAL (interior + central combinados) ── */
  const glTotal  = rawG.length + gcTotal;
  const glConMat = (rawG.filter(r=>YES(r.HAY_MATERIAL_DESIGNADO)).length) + gcConMat;
  const glSinMat = glTotal - glConMat;
  const glCovPct = glTotal>0 ? Math.round(glConMat/glTotal*100) : 0;

  /* ── tiendas OT (circuito adicional) ── */
  const localesOT = rawOT.map(r => ({
    name:      N(r["LOCAL"] || r["Local"] || r["local"]),
    material:  N(r["MATERIAL ENCONTRADO"] || r["Material Encontrado"] || r["material encontrado"]),
    obs:       N(r["OBS"] || r["Obs"] || r["obs"] || r["OBSERVACIONES"] || r["Observaciones"]),
    encargado: N(r["ENCARGADO"] || r["Encargado"] || r["encargado"]),
    link:      N(r["LINK CON SUB CARPETAS"] || r["Link Con Sub Carpetas"] || r["link con sub carpetas"] || r["LINK"] || r["Link"]),
  })).filter(r => r.name);

  const otMatMap = {};
  localesOT.forEach(r => {
    const v = r.material || "Sin material";
    otMatMap[v] = (otMatMap[v]||0) + 1;
  });
  const otMaterialChart = Object.entries(otMatMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([label,value]) => ({ label, value }));

  const otConMat = localesOT.filter(r => r.material && r.material !== "" && r.material.toLowerCase() !== "ninguno" && r.material.toLowerCase() !== "sin material").length;

  return {
    deptBF, deptCP, deptGC, DEPT_CITY,
    cityBF, materialType, materialPhysType, competitors, promoKnowledge,
    materialState, visibilityVsBF,
    locales, localesTiendas, tiendasBancos, estadoTiendas,
    localesOT, otMaterialChart, otConMat,
    gcCityBF, gcMaterialType, gcMaterialPhysType, gcMaterialState, gcLocales,
    gcPeriod, gcTotal, gcConMat, gcSinMatK, gcCovPct,
    glTotal, glConMat, glSinMat, glCovPct,
    period: "Mayo 2026",
    periodTiendas: "Mayo 2026",
    kpi: {
      totalBF, conBF, sinBF: totalBF-conBF,
      covBF: totalBF>0?Math.round(conBF/totalBF*100):0,
      totalCP, conCP, covCP: totalCP>0?Math.round(conCP/totalCP*100):0,
      knowsWell, perfect, departments: depts,
      tTotal, tConMat, tVisible, tConoce, tConComp,
    },
  };
}

/* ── LOADER UI ── */
function showLoader(msg) {
  let ld = document.getElementById("live-loader");
  if (!ld) {
    ld = document.createElement("div");
    ld.id = "live-loader";
    ld.style.cssText = "position:fixed;inset:0;background:linear-gradient(160deg,#0A4A80,#2E8FD4);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;font-family:Inter,sans-serif";
    ld.innerHTML = `
      <div style="font-size:28px;font-weight:800;color:#fff;letter-spacing:-.02em">+<span style="color:#5BB8FF">MARKA</span></div>
      <div style="width:260px;height:3px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden">
        <div id="live-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#5BB8FF,#fff);border-radius:3px;transition:width .4s ease"></div>
      </div>
      <div id="live-msg" style="font-size:12px;color:rgba(255,255,255,.55);text-align:center;max-width:340px"></div>`;
    document.body.appendChild(ld);
  }
  document.getElementById("live-msg").textContent = msg;
}
function setProgress(pct, msg) {
  const bar = document.getElementById("live-bar");
  const txt = document.getElementById("live-msg");
  if (bar) bar.style.width = pct + "%";

/* ── BOOTSTRAP: fetch all sheets then mount React ── */
(async function bootstrap() {
  showLoader("Conectando con Google Sheets…");

  /* Parser CSV simple pero correcto: soporta campos entre comillas que
     contienen comas, comillas dobles escapadas ("") y saltos de línea. */
  function parseCSV(text) {
    const rows = []; let row = []; let field = ""; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], next = text[i+1];
      if (inQuotes) {
        if (c === '"' && next === '"') { field += '"'; i++; }
        else if (c === '"') { inQuotes = false; }
        else { field += c; }
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ""; }
        else if (c === '\r') { /* skip */ }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(v => v !== ""));
  }
  function csvToObjects(rows) {
    if (!rows.length) return [];
    const headers = rows[0];
    return rows.slice(1).map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = r[i] != null ? r[i] : ""; });
      return obj;
    });
  }
  /* gid de cada hoja dentro del spreadsheet, para el respaldo por CSV
     cuando el proxy opensheet.elk.sh falla en una hoja puntual. */
  const SHEET_GIDS = { "RE_COMPE_GASTRO_INT": "1005179077" };

  /* Trae una hoja con reintentos (el proxy opensheet.elk.sh a veces falla de forma
     transitoria — o, como en RE_COMPE_GASTRO_INT, de forma persistente — en una
     sola hoja). Si tras reintentar sigue fallando, se prueba un respaldo leyendo
     el CSV exportado directo de Google Sheets (sin pasar por el proxy). Si eso
     también falla, se devuelve un array vacío en vez de tirar abajo TODO el
     tablero — así una hoja caída solo vacía esa sección puntual, no todas. */
  async function fetchSheet(name, { retries = 2, delayMs = 900 } = {}) {
    let lastErr;
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const r = await fetch(API_BASE + encodeURIComponent(name));
        if (!r.ok) throw new Error("HTTP " + r.status + " — " + name);
        return await r.json();
      } catch (e) {
        lastErr = e;
        if (attempt < retries) await new Promise(res => setTimeout(res, delayMs));
      }
    }
    const gid = SHEET_GIDS[name];
    if (gid) {
      try {
        console.warn("\"" + name + "\" falló en opensheet.elk.sh, probando respaldo directo (CSV de Google Sheets)…");
        const csvUrl = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=" + gid;
        const r = await fetch(csvUrl);
        if (!r.ok) throw new Error("HTTP " + r.status + " (CSV) — " + name);
        const text = await r.text();
        const data = csvToObjects(parseCSV(text));
        console.warn("Respaldo CSV para \"" + name + "\" OK: " + data.length + " filas.");
        return data;
      } catch (e2) {
        console.warn("Respaldo CSV para \"" + name + "\" también falló.", e2);
      }
    }
    console.warn("No se pudo cargar la hoja \"" + name + "\" tras reintentar. Se continúa con los datos vacíos para esa sección.", lastErr);
    return [];
  }
  try {
    setProgress(10, "Cargando");
    const rG = await fetchSheet(SHEETS.gastro);

    setProgress(40, "Cargando");
    const rC = await fetchSheet(SHEETS.compe);

    setProgress(70, "Cargando");
    const rT = await fetchSheet(SHEETS.tiendas);

    setProgress(78, "Cargando circuito adicional…");
    const rOT = await fetchSheet(SHEETS.tiendasOT);

    setProgress(85, "Cargando gastronómico central…");
    const rGC = await fetchSheet(SHEETS.gastroCentral);

    setProgress(90, "Procesando datos…");
    const rawG = normalizeSheet(rG);
    const rawC = normalizeSheet(rC);
    const rawT = rT; // TIENDAS: row 0 is real header
    const rawOT = rOT; // TIENDAS OT: row 0 is real header

    window.TableroData = buildTableroData(rawG, rawC, rawT, rawOT, rGC);

    /* Store raw sheets for detail/evidencias views */
    window.__rawGastro      = rawG;
    window.__rawCompe       = rawC;
    window.__rawTiendas     = rawT;
    window.__rawTiendasOT   = rawOT;
    window.__rawGastroCentral = rGC;

    setProgress(100, `¡Listo! ${rawG.length} gastro int · ${rGC.length} gastro central · ${rawT.length} tiendas · ${rawC.length} competencia`);
    setTimeout(() => {
      hideLoader();
      /* Mount React app after data is ready */
      if (!window.__reactRoot) {
        window.__reactRoot = ReactDOM.createRoot(document.getElementById('root'));
      }
      window.__reactRoot.render(React.createElement(App));
    }, 500);

  } catch(err) {
    console.error("Bootstrap error:", err);
    const txt = document.getElementById("live-msg");
    const bar = document.getElementById("live-bar");
    if (txt) txt.innerHTML = `<span style="color:#FCA5A5"> ${err.message}</span><br><span style="font-size:11px;margin-top:6px;display:block">Verificá que el Google Sheet esté publicado y compartido públicamente.<br>ID: ${SHEET_ID}</span>`;
    if (bar) { bar.style.background="#F87171"; bar.style.width="100%"; }
    /* Fallback: mount with empty data so UI doesn't break */
    window.TableroData = buildTableroData([],[],[],[],[]);
    setTimeout(()=>{ hideLoader(); if(!window.__reactRoot){window.__reactRoot=ReactDOM.createRoot(document.getElementById('root'));} window.__reactRoot.render(React.createElement(App)); }, 3000);
  }
})();

function Donut({ data, size = 132, thickness = 16 }) {
  const total = data.reduce((s, x) => s + (x.value||0), 0) || 1;
  const r = (size - thickness) / 2, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  let off = 0;
  const tipFor = s => {
    const pct = Math.round((s.value||0) / total * 100);
    let t = `${s.label}: ${s.value} de ${total} (${pct}%)`;
    if (s.comments && s.comments.length) t += `\n\nComentarios del relevamiento:\n` + s.comments.map(c=>`• ${c}`).join("\n");
    return t;
  };
  return (
    <div className="donut-wrap">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bpale)" strokeWidth={thickness} />
        {data.map((s, i) => {
          const frac = (s.value||0) / total, dash = frac * circ;
          const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thickness}
            strokeDasharray={`${dash.toFixed(2)} ${(circ - dash).toFixed(2)}`}
            strokeDashoffset={(-off * circ).toFixed(2)}
            transform={`rotate(-90 ${cx} ${cy})`} opacity="0.92" style={{cursor:s.comments?'help':'default'}}>
            <title>{tipFor(s)}</title>
          </circle>;
          off += frac; return el;
        })}
        <text x={cx} y={cy + 6} textAnchor="middle" fontFamily="Inter" fontSize="22" fontWeight="700" fill="#0B2A4A">{total}</text>
      </svg>
      <div className="donut-legend">
        {data.map((s, i) => (
          <div className="dl-row" key={i} title={tipFor(s)} style={{cursor:s.comments&&s.comments.length?'help':'default'}}>
            <span className="dl-dot" style={{ background: s.color }} />
            <span className="dl-label">{s.label}</span>
            <span className="dl-val">{s.value}</span>
            <span className="dl-pct">{Math.round((s.value||0) / total * 100)}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ParaguayHeatMap({ mode = 'bf', data, deptCity, height = 520 }) {
  const wrapRef = useRef(null);
  const tipRef  = useRef(null);
  useEffect(() => {
    const wrap = wrapRef.current;
    if (!wrap || !window.d3 || !window.topojson) return;
    wrap.innerHTML = '';
    const ramp = mode === 'bf'
      ? ['#DBEAFE','#93C5FD','#3B82F6','#1D4ED8','#1E3A8A']
      : ['#FEE2E2','#FCA5A5','#F87171','#DC2626','#991B1B'];
    const stroke = mode === 'bf' ? '#1E3A8A' : '#991B1B';
    const pct = {};
    Object.keys(data).forEach(k => { pct[k] = data[k].total ? Math.round(data[k].con / data[k].total * 100) : 0; });
    const vals = Object.values(pct);
    const maxPct = vals.length ? Math.max(...vals) : 100;
    const scale = d3.scaleLinear().domain([0, maxPct || 100]).range([ramp[0], ramp[ramp.length - 1]]);
    const W = wrap.offsetWidth || 600, H = height;
    const svg = d3.select(wrap).append('svg').attr('viewBox', `0 0 ${W} ${H}`).attr('width','100%').attr('height', H);
    const proj = d3.geoMercator();
    const path = d3.geoPath().projection(proj);
    const tip  = tipRef.current;
    d3.json(window.__resources.pryTopo).then(topo => {
      const features = topojson.feature(topo, topo.objects.pry).features;
      const fc = { type:'FeatureCollection', features };
      proj.fitExtent([[28, 24], [W - 28, H - 24]], fc);
      svg.selectAll('path').data(features).enter().append('path')
        .attr('d', path).attr('stroke','#fff').attr('stroke-width', 1)
        .attr('fill', d => { const info = data[d.properties.name]; return info ? scale(pct[d.properties.name]) : '#EEF4FA'; })
        .on('mousemove', function(event, d) {
          const name = d.properties.name || '';
          const info = data[name] || { total:0, con:0 };
          const p = info.total ? Math.round(info.con / info.total * 100) : 0;
          tip.style.display = 'block';
          tip.style.left = (event.clientX + 16) + 'px';
          tip.style.top  = (event.clientY - 10) + 'px';
          tip.innerHTML = `<div class="mt-name">${name}</div>
            <div class="mt-city">Ciudad ref.: ${deptCity[name] || '—'}</div>
            <div class="mt-row"><span>Locales relevados</span><b>${info.total}</b></div>
            <div class="mt-row"><span>Con material</span><b>${info.con}</b></div>
            <span class="mt-pct" style="background:${stroke}1a;color:${stroke}">${p}% presencia</span>`;
          d3.select(this).attr('stroke', stroke).attr('stroke-width', 2.2);
        })
        .on('mouseleave', function() { tip.style.display='none'; d3.select(this).attr('stroke','#fff').attr('stroke-width',1); });
      svg.selectAll('text.lbl')
        .data(features.filter(d => data[d.properties.name] && data[d.properties.name].total > 0)).enter()
        .append('text').attr('class','lbl')
        .attr('x', d => path.centroid(d)[0]).attr('y', d => path.centroid(d)[1])
        .attr('text-anchor','middle').attr('font-size','11').attr('font-family','Inter')
        .attr('font-weight','800').attr('pointer-events','none')
        .attr('fill', d => pct[d.properties.name] > 55 ? '#fff' : '#0B2A4A')
        .text(d => `${pct[d.properties.name]}%`);
    }).catch(() => { wrap.innerHTML='<div class="nodata">No se pudo cargar el mapa.</div>'; });
  }, [mode, data, height]);
  return (
    <div className="hmap" style={{ minHeight: height }}>
      <div className="hmap-svg" ref={wrapRef} style={{ minHeight: height }} />
      <div className="hmap-tooltip" ref={tipRef} />
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   PAGES
══════════════════════════════════════════════════════════════ */
function ParaguayHeatMapDual({ dataInt, dataGC, deptCity, height=520 }) {
  const wrapRef = useRef(null);
  const tipRef  = useRef(null);
  useEffect(() => {
    const wrap = wrapRef.current;
    if (!wrap || !window.d3 || !window.topojson) return;
    wrap.innerHTML = '';
    const W = wrap.offsetWidth || 600, H = height;
    const svg = d3.select(wrap).append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%').attr('height',H);
    /* patterns */
    const defs = svg.append('defs');
    /* blue ramp for interior */
    const blueScale = d3.scaleLinear().domain([0,100]).range(['#BFDBFE','#1E3A8A']);
    /* green ramp for central — minimum #22C55E so it's always visible */
    const greenScale = d3.scaleLinear().domain([0,100]).range(['#22C55E','#14532D']);
    /* stripe pattern for depts with both */
    defs.append('pattern').attr('id','stripe-dual').attr('patternUnits','userSpaceOnUse')
      .attr('width',8).attr('height',8)
      .attr('patternTransform','rotate(45)')
      .html('<rect width="4" height="8" fill="#3B82F6" opacity=".85"/><rect x="4" width="4" height="8" fill="#16A34A" opacity=".85"/>');
    const proj = d3.geoMercator();
    const path = d3.geoPath().projection(proj);
    const tip  = tipRef.current;
    d3.json(window.__resources.pryTopo).then(topo => {
      const features = topojson.feature(topo, topo.objects.pry).features;
      const fc = { type:'FeatureCollection', features };
      proj.fitExtent([[28,24],[W-28,H-24]], fc);
      const pctInt = {}, pctGC = {};
      Object.keys(dataInt).forEach(k => { pctInt[k] = dataInt[k].total ? Math.round(dataInt[k].con/dataInt[k].total*100) : 0; });
      Object.keys(dataGC).forEach(k => { pctGC[k]  = dataGC[k].total  ? Math.round(dataGC[k].con/dataGC[k].total*100)   : 0; });
      svg.selectAll('path').data(features).enter().append('path')
        .attr('d', path).attr('stroke','#fff').attr('stroke-width',1)
        .attr('fill', d => {
          const nm = d.properties.name;
          const hasInt = !!dataInt[nm], hasGC = !!dataGC[nm];
          if (hasInt && hasGC) return 'url(#stripe-dual)';
          if (hasInt) return blueScale(pctInt[nm]);
          if (hasGC)  return greenScale(pctGC[nm]);
          return '#EEF4FA';
        })
        .on('mousemove', function(event, d) {
          const nm = d.properties.name || '';
          const iInfo = dataInt[nm]; const gInfo = dataGC[nm];
          let html = `<div class="mt-name">${nm}</div>`;
          if (iInfo) html += `<div class="mt-row" style="color:#1D4ED8">● Interior: ${iInfo.con}/${iInfo.total} (${pctInt[nm]}%)</div>`;
          if (gInfo) html += `<div class="mt-row" style="color:#15803D">● Central: ${gInfo.con}/${gInfo.total} (${pctGC[nm]}%)</div>`;
          if (!iInfo && !gInfo) html += `<div class="mt-row">Sin datos</div>`;
          tip.style.display='block';
          tip.style.left=(event.clientX+16)+'px';
          tip.style.top=(event.clientY-10)+'px';
          tip.innerHTML=html;
          d3.select(this).attr('stroke','#0B2A4A').attr('stroke-width',2);
        })
        .on('mouseleave', function() { tip.style.display='none'; d3.select(this).attr('stroke','#fff').attr('stroke-width',1); });
      /* labels */
      const labeled = features.filter(d => dataInt[d.properties.name] || dataGC[d.properties.name]);
      svg.selectAll('text.lbl').data(labeled).enter().append('text').attr('class','lbl')
        .attr('x', d=>path.centroid(d)[0]).attr('y', d=>path.centroid(d)[1])
        .attr('text-anchor','middle').attr('font-size','10').attr('font-family','Inter')
        .attr('font-weight','800').attr('pointer-events','none').attr('fill','#fff')
        .text(d => {
          const nm=d.properties.name;
          const parts=[];
          if(dataInt[nm]) parts.push(`${pctInt[nm]}%`);
          if(dataGC[nm])  parts.push(`${pctGC[nm]}%`);
          return parts.join(' / ');
        });
    }).catch(()=>{ wrap.innerHTML='<div class="nodata">No se pudo cargar el mapa.</div>'; });
  }, [dataInt, dataGC, height]);
  return (
    <div className="hmap" style={{minHeight:height}}>
      <div className="hmap-svg" ref={wrapRef} style={{minHeight:height}}/>
      <div className="hmap-tooltip" ref={tipRef}/>
    </div>
  );
}

              const byVolume = (D.gcCityBF||[])
                .map(r=>({...r, n:r.con+r.sin, pct: r.con+r.sin>0?Math.round(r.con/(r.con+r.sin)*100):0}))
                .sort((a,b)=>b.n-a.n);
              const bySig = byVolume.filter(c=>c.n>=MIN_SAMPLE);
              const best = (bySig.length?bySig:byVolume).reduce((m,c)=>c.con>m.con?c:m, (bySig.length?bySig:byVolume)[0]);
              if (!byVolume.length) return <div className="nodata">Sin datos aún.</div>;
              return (
                <>
                  {best && (
                    <div style={{marginBottom:10,padding:'8px 12px',background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:8,fontSize:12,color:'#15803D',fontWeight:600}}>
                      🏆 {best.city} es la ciudad con más material BF colocado en Central, considerando el volumen relevado: {best.con} de {best.con+best.sin} locales.
                    </div>
                  )}
                  <div style={{display:'flex',flexDirection:'column',gap:8,maxHeight:420,overflowY:'auto'}}>
                    {byVolume.map((r,i)=>{
                      const lowN = r.n < MIN_SAMPLE;
                      return (
                        <div key={i} onClick={()=>window.__goToDetalle(r.city,'gastro_central')}
                          style={{border:'1px solid var(--border2)',borderRadius:8,padding:'8px 10px',cursor:'pointer'}}
                          title={`Ver detalle de locales en ${r.city}`}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                            <span style={{fontSize:12,fontWeight:700,color:'var(--navy)'}}>{r.city}</span>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <span style={{fontSize:11,fontWeight:700,color:'var(--muted)'}}>{r.n} locales</span>
                              <span style={{fontSize:10,fontWeight:800,color:'#15803D',background:'#DCFCE7',borderRadius:10,padding:'1px 7px'}}>Nº {i+1}</span>
                            </div>
                          </div>
                          <div style={{fontSize:11,color: lowN?'var(--orange)':'var(--text)',marginBottom:5}}>
                            Cobertura: {r.pct}% ({r.con} con material BF){lowN && ' · ⚠ muestra baja'}
                          </div>
                          <div style={{height:6,background:'#DCFCE7',borderRadius:3,overflow:'hidden'}}>
                            <div style={{height:'100%',width:r.pct+'%',background: lowN?'var(--orange)':'#16A34A',borderRadius:3}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}
          </div>
        </div>
      </>}

      {/* ── INTERIOR ── */}
      {tab==='interior' && <>
        <div className="kpi-grid">
          <KpiCard accent="b" label="Locales relevados"  value={k.totalBF} sub={D.period} subTone="muted" />
          <KpiCard accent="g" label="Con material BF"    value={k.conBF}   sub={`${k.covBF}% cobertura`} subTone="pos" />
          <KpiCard accent="r" label="Sin material BF"    value={k.sinBF}   sub={`${100-k.covBF}% del total`} subTone="neg" />
          <KpiCard accent="y" label="Conocen la promo"   value={k.knowsWell} sub="encargados informados" subTone="mid" />
          <KpiCard accent="b" label="% de locales relevados con material BF en perfecto estado" value={k.perfect} sub={k.conBF>0?`${Math.round(k.perfect/k.conBF*100)}% de los colocados`:''} subTone="pos" />
        </div>
        <HeatBlock mode="bf" />
        <div className="grid-2">
          <Card title="Locales por ciudad — Con vs Sin material">
            <LegendRow items={[{label:'Con material',color:'var(--blue-700)'},{label:'Sin material',color:'#CBD5E1'}]} />
            <GroupedHBarChart data={D.cityBF} onCityClick={d => window.__goToDetalle(d.city, 'gastro_int')} />
          </Card>
          <Card title="Tipo de material"><HBarChart data={D.materialType} color="var(--blue-mid)" /></Card>
        </div>
        <div className="grid-2">
          <Card title="% de encargados según cuánto conocen la promo"><Donut data={D.promoKnowledge} /></Card>
          <Card title="% de locales según el estado del material BF colocado"><Donut data={D.materialState} /></Card>
        </div>
      </>}

      {/* ── COMPETENCIA INTERIOR ── */}
      {tab==='compe' && <>
        <div className="kpi-grid">
          <KpiCard accent="r" label="Locales relevados"    value={k.totalCP} sub="mismos puntos gastro interior" subTone="muted" />
          <KpiCard accent="r" label="Con material comp."   value={k.conCP}   sub={`${k.covCP}%`} subTone="neg" />
          <KpiCard accent="b" label="Sin material comp."   value={k.totalCP-k.conCP} sub={`${100-k.covCP}%`} subTone="pos" />
          <KpiCard accent="y" label="Marcas detectadas"    value={D.competitors.length} sub="entidades activas" subTone="mid" />
        </div>
        <HeatBlock mode="cp" />
        <div className="grid-2">
          <Card title="Marcas competidoras detectadas" sub="Cantidad de locales donde se identificó material de cada marca/banco competidor (un local puede tener más de una marca presente)">
            <HBarChart data={D.competitors} color="var(--red)" />
          </Card>
          <Card title="% de locales según visibilidad de la competencia frente a BF" sub="Pasá el mouse sobre el gráfico para ver el % y comentarios reales del relevamiento">
            <Donut data={D.visibilityVsBF} />
          </Card>
        </div>
      </>}
    </>
  );
}
